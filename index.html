<body class="bg-slate-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 아이콘 컴포넌트 ---
        const Icon = ({ path, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className || "w-6 h-6"}>{path}</svg>
        );
        const ChevronLeft = ({className}) => <Icon className={className} path={<path d="m15 18-6-6 6-6"/>} />;
        const Save = ({className}) => <Icon className={className} path={<><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></>} />;
        const AlertCircle = ({className}) => <Icon className={className} path={<><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>} />;
        const Trash2 = ({className}) => <Icon className={className} path={<><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>} />;
        const Camera = ({className}) => <Icon className={className} path={<><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></>} />;
        const VideoIcon = ({className}) => <Icon className={className} path={<><path d="m22 8-6 4 6 4V8Z"/><rect x="2" y="6" width="14" height="12" rx="2" ry="2"/></>} />;
        const Plus = ({className}) => <Icon className={className} path={<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>} />;
        const CheckCircle2 = ({className}) => <Icon className={className} path={<><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>} />;
        const RefreshCw = ({className}) => <Icon className={className} path={<><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></>} />;
        const Cloud = ({className}) => <Icon className={className} path={<path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/>} />;
        const Mic = ({className}) => <Icon className={className} path={<><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></>} />;
        const Folder = ({className}) => <Icon className={className} path={<><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></>} />;
        const ImageIcon = ({className}) => <Icon className={className} path={<><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></>} />;
        const XIcon = ({className}) => <Icon className={className} path={<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>} />;

        // --- 선택 옵션 ---
        const WORKLOAD_OPTIONS = [
          { value: 1, label: '매우쉬움' },
          { value: 2, label: '쉬움' },
          { value: 3, label: '약간힘듦' },
          { value: 4, label: '힘듦' },
          { value: 5, label: '매우힘듦' }
        ];

        const FREQUENCY_OPTIONS = [
          { value: 1, label: '3개월마다(2~3회/년)' },
          { value: 2, label: '가끔(하루또는1회/2~3일)' },
          { value: 3, label: '자주(1일4시간)' },
          { value: 4, label: '계속(1일4시간이상)' },
          { value: 5, label: '초과근무시간(1일8시간 이상)' }
        ];

        // 작업 시간 옵션
        const WORK_START_HOURS = ['06:00', '06:30', '07:00', '07:30', '08:00', '08:30', '09:00', '09:30', '10:00', '10:30', '11:00'];
        const WORK_END_HOURS = ['15:00', '15:30', '16:00', '16:30', '17:00', '17:30', '18:00'];
        const LUNCH_START_HOURS = ['11:00', '11:30', '12:00', '12:30', '13:00'];
        const LUNCH_END_HOURS = ['12:00', '12:30', '13:00', '13:30', '14:00'];

        // 초기 빈 공정 양식
        const emptyProcess = () => ({
          id: 'proc_' + Date.now().toString() + '_' + Math.random().toString(36).substr(2, 9),
          processName: '',
          isCustomProcess: false, // 🔥 공정명 직접입력 모드 여부
          workContent: '',
          workTimeStart: '',
          workTimeEnd: '',
          lunchTimeStart: '',
          lunchTimeEnd: '',
          workTimeManual: '',
          workInfo: '',        // 음성 요약 전용
          workInfoManual: '',  // 직접 작성 전용 (추가 정보)
          workloads: [{ count: '', duration: '' }],           // 1) 작업량
          heavyObjects: [{ weight: '', count: '' }],          // 2) 중량물
          handTools: [{ weight: '', count: '' }],             // 3) 수공구
          workload: 0,
          frequency: 0,
          photos: [],
          videos: []
        });

        const compressImage = (file) => {
          return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
              const img = new Image();
              img.src = event.target.result;
              img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 854; 
                const MAX_HEIGHT = 854;
                let width = img.width;
                let height = img.height;

                if (width > height) {
                  if (width > MAX_WIDTH) {
                    height *= MAX_WIDTH / width;
                    width = MAX_WIDTH;
                  }
                } else {
                  if (height > MAX_HEIGHT) {
                    width *= MAX_HEIGHT / height;
                    height = MAX_HEIGHT;
                  }
                }
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                resolve(canvas.toDataURL('image/jpeg', 0.5));
              };
            };
          });
        };

        // 💡 AI 대화 요약 (Gemini API) - '라이너 회의록 자동화' 스타일로 프롬프트 전면 개편
        const summarizeTextWithRetry = async (text, field, retries = 5) => {
          // 🚨 [매우 중요] Vercel 배포 시 아래 쌍따옴표 안에 구글 Gemini API 키를 넣으셔야 AI가 작동합니다!
          const apiKey = ""; 
          const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
          
          const fieldName = field === 'workContent' ? '작업내용' : '작업정보(취급 무게, 자세, 빈도 등)';
          
          // 🔥 AI에게 부여하는 엄격한 시스템 지시어
          const systemPrompt = `당신은 최고 수준의 '산업보건 인터뷰 회의록 자동화 AI(Liner 스타일)'입니다. 
근로자와의 인터뷰 음성을 분석하여 구조화된 요약 보고서를 작성해 주세요.

[회의록 요약 및 자동화 엄격 규칙]
1. '어', '그', '음', '막' 같은 추임새, 감탄사, 인사말, 감정적 호소(아프다, 힘들다), 잡담 등 쓸데없는 언어는 100% 삭제합니다.
2. 답변을 구어체가 아닌, 객관적이고 건조한 보고서용 명사형 문장(~음, ~함)으로 변환합니다.
3. 구체적인 수치(무게, 횟수, 시간)와 객관적 사실, 위험 요인(불편 부위, 불안정한 자세)만 정확히 포착합니다.
4. 내용을 카테고리별로 구조화(기호 '-' 활용)하여 가독성을 높입니다.

[출력 포맷: ${fieldName}에 맞게 구성]
${field === 'workContent' ? '■ 핵심 요약\n- \n■ 세부 작업 순서\n- ' : '■ 취급 중량 및 빈도\n- \n■ 주요 작업 자세 및 특이사항\n- '}`;

          const payload = { 
            contents: [{ parts: [{ text: `[실제 인터뷰 대화 내용]\n${text}` }] }],
            systemInstruction: { parts: [{ text: systemPrompt }] },
            generationConfig: {
              temperature: 0.0, // 창의성을 완전히 제거하여 팩트 기반의 건조한 보고서체 유지
              maxOutputTokens: 300 
            }
          };
          
          for (let i = 0; i < retries; i++) {
            try {
              const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
              });
              if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
              const data = await res.json();
              return data.candidates[0].content.parts[0].text.trim();
            } catch (err) {
              if (i === retries - 1) throw err;
              await new Promise(resolve => setTimeout(resolve, Math.pow(2, i) * 1000));
            }
          }
        };

        // --- 메인 앱 ---
        function MobileApp() {
          const [companyName, setCompanyName] = useState('');
          const [isCustomCompany, setIsCustomCompany] = useState(false); // 🔥 단위사업체명 직접입력 모드
          const [category, setCategory] = useState(''); 
          const [processes, setProcesses] = useState([emptyProcess()]);
          const [toastMessage, setToastMessage] = useState('');
          const [isSyncing, setIsSyncing] = useState(false); 
          const [lastSyncTime, setLastSyncTime] = useState('');
          const [uploadProgress, setUploadProgress] = useState({ current: 0, total: 0, text: '', percentage: 0 });

          // 💡 구글 시트에서 불러온 옵션 목록
          const [fetchedCompanies, setFetchedCompanies] = useState([]);
          const [fetchedProcessMap, setFetchedProcessMap] = useState({}); // { '사업장A': ['공정1', '공정2'] }

          // 💡 카메라 앱 선택 팝업용 State 추가
          const [videoPopupProcessId, setVideoPopupProcessId] = useState(null);

          // 💡 음성 인식 및 요약 관련 State
          const [recordingField, setRecordingField] = useState(null); 
          const [isSummarizing, setIsSummarizing] = useState(false);
          const recognitionRef = useRef(null);
          const transcriptRef = useRef('');
          const currentSessionTextRef = useRef(''); 
          const manualStopRef = useRef(false); 
          const recordingTimerRef = useRef(null); 

          const TARGET_FOLDER_ID = '16DTHs4okhpe7dgXStwkp1KuhI3APU0JI';
          // 🚀 [중요] 반드시 새로 배포한 '구글 웹 앱 URL'을 아래에 붙여넣으세요!
          const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyoy87S02bO4eUFmoH89AxFsxjNmWzCrDtnkI7ZPOBuBJNND0INUA489XOpvpILNK9J/exec'; 

          // 🔥 1. 구글 스프레드시트 데이터 불러오기 로직 (CSV 파싱)
          useEffect(() => {
            const fetchSpreadsheetData = async () => {
              try {
                // 사용자가 요청한 구글 스프레드시트 아이디
                const SHEET_ID = '1J9MkuVO5cCMhpEZFVZrOnNPMJf-quZlBpr6YzrgBfbo';
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=0`;
                
                const response = await fetch(url);
                if (!response.ok) throw new Error('Failed to fetch CSV');
                const csvText = await response.text();

                // CSV 파서 (따옴표 및 쉼표 구분 완벽 처리)
                const rows = [];
                let row = [];
                let inQuotes = false;
                let val = '';
                for (let i = 0; i < csvText.length; i++) {
                  const char = csvText[i];
                  if (char === '"') {
                    inQuotes = !inQuotes;
                  } else if (char === ',' && !inQuotes) {
                    row.push(val.trim());
                    val = '';
                  } else if (char === '\n' && !inQuotes) {
                    row.push(val.trim());
                    rows.push(row);
                    row = [];
                    val = '';
                  } else {
                    val += char;
                  }
                }
                row.push(val.trim());
                rows.push(row);

                const companiesSet = new Set();
                const pMap = {};

                // 첫 줄(Header) 제외하고 데이터 추출 (A열: 단위사업체명, B열: 공정명 가정)
                rows.forEach((r, idx) => {
                  if (idx === 0) return; // Header 스킵
                  const comp = r[0];
                  const proc = r[1];
                  if (comp) {
                    companiesSet.add(comp);
                    if (!pMap[comp]) pMap[comp] = [];
                    if (proc && !pMap[comp].includes(proc)) {
                      pMap[comp].push(proc);
                    }
                  }
                });

                setFetchedCompanies(Array.from(companiesSet));
                setFetchedProcessMap(pMap);

              } catch (error) {
                console.error("스프레드시트 데이터 불러오기 실패:", error);
                // 권한이 없거나 네트워크 에러 시 조용히 패스 (직접 입력 사용)
              }
            };
            
            fetchSpreadsheetData();
          }, []);

          // 2. 초기 로컬 스토리지 불러오기
          useEffect(() => {
            try {
              const savedCompany = localStorage.getItem('localCompanyName');
              if (savedCompany) {
                setCompanyName(savedCompany);
              }

              const savedCategory = localStorage.getItem('localCategory'); 
              if (savedCategory) setCategory(savedCategory);

              const savedData = localStorage.getItem('localProcessData');
              if (savedData) {
                const parsedData = JSON.parse(savedData);
                const safeData = parsedData.map(p => ({
                  ...emptyProcess(),
                  ...p,
                  workloads: p.workloads?.length ? p.workloads : [{ count: '', duration: '' }],
                  heavyObjects: p.heavyObjects?.length ? p.heavyObjects : [{ weight: '', count: '' }],
                  handTools: p.handTools?.length ? p.handTools : [{ weight: '', count: '' }],
                  photos: Array.isArray(p.photos) ? p.photos.filter(photo => photo !== null) : [],
                  videos: Array.isArray(p.videos) ? p.videos : []
                }));
                setProcesses(safeData);
              }
            } catch (error) {
              localStorage.removeItem('localProcessData');
            }
          }, []);

          // 3. 업체 리스트가 로드되었을 때, 기존 저장된 값이 리스트에 없다면 자동으로 '직접입력' 모드로 전환
          useEffect(() => {
            if (companyName && fetchedCompanies.length > 0 && !fetchedCompanies.includes(companyName)) {
              setIsCustomCompany(true);
            }
          }, [companyName, fetchedCompanies]);

          useEffect(() => {
            if (toastMessage && !isSyncing && !isSummarizing && !recordingField) {
              const timer = setTimeout(() => setToastMessage(''), 3000);
              return () => clearTimeout(timer);
            }
          }, [toastMessage, isSyncing, isSummarizing, recordingField]);

          // 즉시 요약 실행 함수
          const executeSummary = async (textToSummarize, processId, field) => {
            if (textToSummarize.length === 0) {
              setToastMessage('⚠️ 입력된 음성이 없습니다.');
              return;
            }
            setToastMessage('⏳ AI가 대화 내용을 즉시 요약 중입니다...');
            setIsSummarizing(true);
            try {
              const summary = await summarizeTextWithRetry(textToSummarize, field);
              setProcesses(prev => prev.map(p => {
                if (p.id === processId) {
                  const existingText = p[field] ? p[field] + '\n' : '';
                  return { ...p, [field]: existingText + summary };
                }
                return p;
              }));
              setToastMessage('✨ 요약 완료 및 입력되었습니다.');
            } catch (error) {
              console.error("AI 요약 실패:", error);
              setToastMessage('❌ 요약 중 오류 발생. 원문을 입력합니다.');
              setProcesses(prev => prev.map(p => {
                if (p.id === processId) {
                  const existingText = p[field] ? p[field] + '\n' : '';
                  return { ...p, [field]: existingText + "[음성 원문]\n" + textToSummarize };
                }
                return p;
              }));
            } finally {
              setIsSummarizing(false);
            }
          };

          // 수동 종료 방식 음성인식
          const toggleRecording = async (processId, field) => {
            const fieldKey = `${processId}-${field}`;
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

            if (recordingField === fieldKey) {
              manualStopRef.current = true;
              if (recordingTimerRef.current) clearTimeout(recordingTimerRef.current);
              
              const finalText = (transcriptRef.current + ' ' + currentSessionTextRef.current).trim();
              if (recognitionRef.current) {
                recognitionRef.current.onend = null; 
                recognitionRef.current.abort(); 
              }
              setRecordingField(null);
              transcriptRef.current = '';
              currentSessionTextRef.current = '';
              executeSummary(finalText, processId, field);
            } 
            else {
              if (!SpeechRecognition) {
                alert('해당 브라우저에서는 음성 인식을 지원하지 않습니다.');
                return;
              }

              try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                stream.getTracks().forEach(track => track.stop()); 
              } catch (err) {
                alert("마이크 권한이 거부되었습니다. 권한을 '허용'으로 변경해주세요.");
                return;
              }

              manualStopRef.current = false; 
              transcriptRef.current = '';
              currentSessionTextRef.current = '';
              if (recognitionRef.current) recognitionRef.current.abort();
              if (recordingTimerRef.current) clearTimeout(recordingTimerRef.current);

              recordingTimerRef.current = setTimeout(() => {
                setToastMessage('⏳ 최대 녹음 시간(5분)에 도달하여 요약을 시작합니다.');
                manualStopRef.current = true;
                const finalText = (transcriptRef.current + ' ' + currentSessionTextRef.current).trim();
                if (recognitionRef.current) {
                  recognitionRef.current.onend = null;
                  recognitionRef.current.abort();
                }
                setRecordingField(null);
                transcriptRef.current = '';
                currentSessionTextRef.current = '';
                executeSummary(finalText, processId, field);
              }, 5 * 60 * 1000); 

              const recognition = new SpeechRecognition();
              recognition.lang = 'ko-KR';
              recognition.continuous = false; 
              recognition.interimResults = true;

              recognition.onresult = (event) => {
                let sessionText = '';
                for (let i = 0; i < event.results.length; ++i) {
                  sessionText += event.results[i][0].transcript;
                }
                currentSessionTextRef.current = sessionText;
              };

              recognition.onerror = (event) => {
                if (event.error === 'not-allowed' || event.error === 'service-not-allowed') {
                  manualStopRef.current = true;
                  setRecordingField(null);
                }
              };

              recognition.onend = () => {
                if (currentSessionTextRef.current.trim()) {
                  transcriptRef.current += currentSessionTextRef.current.trim() + ' ';
                  currentSessionTextRef.current = '';
                }
                if (!manualStopRef.current) {
                  try { recognition.start(); } catch (e) {}
                }
              };

              try {
                recognition.start();
                recognitionRef.current = recognition;
                setRecordingField(fieldKey);
                setToastMessage('🎙️ 대화 녹음 중... (직접 종료 버튼을 누를 때까지 꺼지지 않습니다)');
              } catch(e) { console.error(e); }
            }
          };

          // 🚀 [신규 기능] 사진/동영상 첨부 시 구글 드라이브 즉시 업로드 처리
          const handleMediaCapture = async (e, processId, type) => {
            const file = e.target.files[0];
            if (!file) return;

            // 파일 용량 제한 (동영상 30MB)
            const maxSizeMB = type === 'photo' ? 10 : 30; 
            if (file.size > maxSizeMB * 1024 * 1024) {
              alert(`⚠️ 파일 용량이 너무 큽니다! (${(file.size / 1024 / 1024).toFixed(1)}MB)\n\n해결방법: 카메라 설정에서 화질을 낮춰주세요.`);
              e.target.value = null;
              return;
            }

            // 업로드 화면 강제 활성화 (Z-index 120 레벨로 가장 위에 띄움)
            setIsSyncing(true);
            setUploadProgress({ 
              current: 0, total: 1, 
              text: `☁️ ${type === 'photo' ? '사진' : '동영상'}을 구글 서버로 바로 전송 중입니다... (창을 닫지 마세요)`, 
              percentage: 20 
            });

            let base64Data = null; 

            try {
              if (type === 'photo') {
                base64Data = await compressImage(file);
              } else {
                base64Data = await new Promise((resolve) => {
                  const reader = new FileReader();
                  reader.onloadend = () => resolve(reader.result);
                  reader.readAsDataURL(file);
                });
              }

              setUploadProgress({ current: 0, total: 1, text: `☁️ 구글 드라이브에 저장 중...`, percentage: 60 });

              // 공정명 파악 후 파일명 생성
              const currentProcess = processes.find(p => p.id === processId);
              const pName = currentProcess?.processName || '미지정공정';
              const fileExt = type === 'photo' ? 'jpg' : 'mp4';
              
              const catPrefix = category ? `(${category})` : '';
              const mediaCount = type === 'photo' ? (currentProcess.photos?.length || 0) : (currentProcess.videos?.length || 0);
              const fileName = `${catPrefix}${companyName || '미지정사업체'}_${pName}${mediaCount + 1}.${fileExt}`;

              if (GAS_WEB_APP_URL.includes('여기에_복사한')) {
                 throw new Error("구글 스크립트 URL이 설정되지 않았습니다.");
              }

              // 구글 앱스 스크립트로 1건 즉시 전송
              const fetchUrl = GAS_WEB_APP_URL + (GAS_WEB_APP_URL.includes('?') ? '&' : '?') + 't=' + Date.now();
              const response = await fetch(fetchUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({
                  type: 'media',
                  folderId: TARGET_FOLDER_ID,
                  fileName: fileName,
                  fileData: base64Data
                })
              });
              
              const result = await response.json();
              if (result.status !== "success") throw new Error(result.message);

              setUploadProgress({ current: 1, total: 1, text: `✅ 업로드 완료!`, percentage: 100 });

              const mediaObj = { isUploaded: true, base64: base64Data, fileName: fileName };
              
              setProcesses(processes.map(p => {
                  if (p.id === processId) {
                      return type === 'photo' 
                          ? { ...p, photos: [...(p.photos || []), mediaObj] }
                          : { ...p, videos: [...(p.videos || []), mediaObj] };
                  }
                  return p;
              }));

              setTimeout(() => setIsSyncing(false), 800);

            } catch (error) {
              console.error(error);
              alert("🚨 즉시 전송 실패: " + error.message + "\n\n오프라인 모드로 휴대폰에 임시 저장합니다. (나중에 최종저장 시 함께 전송됩니다.)");
              
              if (base64Data) {
                setProcesses(processes.map(p => {
                    if (p.id === processId) {
                        return type === 'photo' 
                            ? { ...p, photos: [...(p.photos || []), base64Data] }
                            : { ...p, videos: [...(p.videos || []), base64Data] };
                    }
                    return p;
                }));
              }
              setIsSyncing(false);
            }
            e.target.value = null; // 인풋 초기화
          };

          // 🚀 최종 텍스트 데이터 전송
          const saveToServer = async (data, isAutoSave = false) => {
            localStorage.setItem('localProcessData', JSON.stringify(data));
            localStorage.setItem('localCompanyName', companyName);
            localStorage.setItem('localCategory', category); 
            if (isAutoSave) {
              setToastMessage('📱 기기 내부 임시 저장 완료');
              return;
            }

            if (GAS_WEB_APP_URL.includes('여기에_복사한')) {
              alert("소스코드에 구글 앱스 스크립트 URL이 입력되지 않았습니다!");
              return;
            }

            setIsSyncing(true);
            
            try {
              const mediaQueue = [];
              const nowForName = new Date();
              const timeStr = `${nowForName.getHours()}${nowForName.getMinutes()}${nowForName.getSeconds()}`;

              const fetchUrl = GAS_WEB_APP_URL + (GAS_WEB_APP_URL.includes('?') ? '&' : '?') + 't=' + Date.now();

              const catPrefix = category ? `(${category})` : '';
              
              const spreadsheetPayload = {
                type: 'spreadsheet',
                folderId: TARGET_FOLDER_ID,
                spreadsheetName: `${catPrefix}${companyName || '미지정사업체'}`,
                processes: data.map((p, index) => {
                  const processName = p.processName || `미지정_공정_${index + 1}`;
                  const formattedWorkTime = `업무: ${p.workTimeStart || '?'}~${p.workTimeEnd || '?'} / 점심: ${p.lunchTimeStart || '?'}~${p.lunchTimeEnd || '?'} / 기타: ${p.workTimeManual}`;
                  
                  // 1) 작업량 포맷팅
                  const validWorkloads = p.workloads?.filter(item => item.count || item.duration);
                  const strWorkloads = validWorkloads?.length > 0 
                    ? validWorkloads.map((item, i) => `${i+1}. 횟수: ${item.count||'미입력'}, 소요시간: ${item.duration||'미입력'}`).join('\n')
                    : '해당없음';
                  
                  // 2) 중량물 포맷팅
                  const validHeavyObjects = p.heavyObjects?.filter(item => item.weight || item.count);
                  const strHeavyObjects = validHeavyObjects?.length > 0 
                    ? validHeavyObjects.map((item, i) => `${i+1}. 무게: ${item.weight||'미선택'}, 취급횟수: ${item.count||'미입력'}`).join('\n')
                    : '해당없음';

                  // 3) 수공구 포맷팅
                  const validHandTools = p.handTools?.filter(item => item.weight || item.count);
                  const strHandTools = validHandTools?.length > 0 
                    ? validHandTools.map((item, i) => `${i+1}. 무게: ${item.weight||'미선택'}, 취급횟수: ${item.count||'미입력'}`).join('\n')
                    : '해당없음';
                  
                  (p.photos || []).forEach((photoItem, i) => {
                    const fileName = `${catPrefix}${companyName || '미지정사업체'}_${processName}${i + 1}.jpg`;
                    if (typeof photoItem === 'string') {
                      mediaQueue.push({ type: 'media', folderId: TARGET_FOLDER_ID, fileName: fileName, fileData: photoItem });
                    } else if (photoItem && !photoItem.isUploaded) {
                      mediaQueue.push({ type: 'media', folderId: TARGET_FOLDER_ID, fileName: fileName, fileData: photoItem.base64 });
                    }
                  });
                  (p.videos || []).forEach((videoItem, i) => {
                    const fileName = `${catPrefix}${companyName || '미지정사업체'}_${processName}${i + 1}.mp4`;
                     if (typeof videoItem === 'string') {
                      mediaQueue.push({ type: 'media', folderId: TARGET_FOLDER_ID, fileName: fileName, fileData: videoItem });
                    } else if (videoItem && !videoItem.isUploaded) {
                      mediaQueue.push({ type: 'media', folderId: TARGET_FOLDER_ID, fileName: fileName, fileData: videoItem.base64 });
                    }
                  });

                  return {
                    sheetName: processName,
                    info: {
                      "단위사업체": companyName || '미지정사업체',
                      "공정명": processName,
                      "작업내용": p.workContent || '미입력',
                      "작업시간": formattedWorkTime,
                      "작업정보 (음성요약)": p.workInfo || '해당없음',
                      "작업량": strWorkloads,
                      "중량물 취급": strHeavyObjects,
                      "수공구 취급": strHandTools,
                      "작업정보 (기타 추가)": p.workInfoManual || '해당없음',
                      "작업부하(A)": p.workload,
                      "작업빈도(B)": p.frequency,
                      "총점": p.workload * p.frequency
                    }
                  };
                })
              };

              const totalTasks = 1 + mediaQueue.length;
              let completedTasks = 0;

              const updateProgress = (text) => {
                const percentage = Math.round((completedTasks / totalTasks) * 100);
                setUploadProgress({ current: completedTasks, total: totalTasks, text, percentage });
              };

              updateProgress('☁️ 조사표 텍스트 데이터를 전송 중...');
              
              let response = await fetch(fetchUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(spreadsheetPayload)
              });
              let result = await response.json();
              if (result.status !== "success") throw new Error(result.message);

              completedTasks++;
              
              if (mediaQueue.length > 0) {
                updateProgress('☁️ 미전송 미디어 파일 동기화 중...');
                const totalMedia = mediaQueue.length;
                for (let i = 0; i < totalMedia; i++) {
                  const mediaItem = mediaQueue[i];
                  updateProgress(`재업로드 중 (${i + 1}/${totalMedia})`);
                  
                  response = await fetch(fetchUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(mediaItem)
                  });
                  result = await response.json();
                  if (result.status !== "success") throw new Error(`업로드 실패: ${mediaItem.fileName}`);
                  
                  completedTasks++;
                  updateProgress(`업로드 완료 (${i + 1}/${totalMedia})`);
                }
              }
              
              completedTasks = totalTasks;
              updateProgress('✅ 모든 조사 내용 전송 완료!');
              
              const now = new Date();
              setLastSyncTime(`${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`);
              
              setTimeout(() => {
                if(window.confirm("구글 드라이브에 안전하게 전송되었습니다.\n새로운 현장 조사를 위해 화면을 초기화할까요?")) {
                  localStorage.removeItem('localProcessData');
                  localStorage.removeItem('localCompanyName');
                  localStorage.removeItem('localCategory'); 
                  setCompanyName('');
                  setCategory('');
                  setIsCustomCompany(false);
                  setProcesses([emptyProcess()]);
                  setToastMessage('✨ 데이터가 초기화되었습니다. 새 조사를 시작하세요.');
                } else {
                  setToastMessage('✅ 모든 데이터 전송 완료!');
                }
                setIsSyncing(false);
              }, 600);

            } catch (error) {
              console.error("업로드 실패:", error);
              alert("🚨 저장 실패: " + error.message);
              setToastMessage('❌ 업로드 중 오류가 발생했습니다.');
              setIsSyncing(false);
            }
          };

          const addProcess = () => {
            saveToServer(processes, true);
            setProcesses([...processes, emptyProcess()]);
          };

          const handleManualSave = () => saveToServer(processes, false);

          const handleReset = () => {
            if(window.confirm("모든 작성 내용이 삭제되고 초기화됩니다.\n계속하시겠습니까?")) {
              localStorage.removeItem('localProcessData');
              localStorage.removeItem('localCompanyName');
              localStorage.removeItem('localCategory'); 
              setCompanyName('');
              setCategory('');
              setIsCustomCompany(false);
              setProcesses([emptyProcess()]);
              setToastMessage('✨ 데이터가 초기화되었습니다. 새 조사를 시작하세요.');
            }
          };

          const removeProcess = (id) => {
            if (processes.length === 1) return alert('최소 1개의 공정은 있어야 합니다.');
            if(window.confirm('이 공정을 삭제하시겠습니까?')) {
               setProcesses(processes.filter(p => p.id !== id));
            }
          };

          const updateProcess = (id, field, value) => {
            setProcesses(processes.map(p => p.id === id ? { ...p, [field]: value } : p));
          };

          const updateNestedArray = (processId, fieldName, index, key, value) => {
            setProcesses(processes.map(p => {
              if (p.id === processId) {
                const newArray = [...p[fieldName]];
                newArray[index] = { ...newArray[index], [key]: value };
                return { ...p, [fieldName]: newArray };
              }
              return p;
            }));
          };

          const addNestedItem = (processId, fieldName, emptyItem) => {
            setProcesses(processes.map(p => {
              if (p.id === processId) {
                return { ...p, [fieldName]: [...(p[fieldName] || []), emptyItem] };
              }
              return p;
            }));
          };

          const removeNestedItem = (processId, fieldName, index) => {
            setProcesses(processes.map(p => {
              if (p.id === processId) {
                const newArray = [...p[fieldName]];
                newArray.splice(index, 1);
                return { ...p, [fieldName]: newArray };
              }
              return p;
            }));
          };

          const removeMedia = (processId, index, type) => {
            if(confirm(`이 ${type === 'photo' ? '사진' : '동영상'}을 삭제하시겠습니까?`)) {
              setProcesses(processes.map(p => {
                  if (p.id === processId) {
                      const newList = [...(p[type === 'photo' ? 'photos' : 'videos'] || [])];
                      newList.splice(index, 1);
                      return type === 'photo' ? { ...p, photos: newList } : { ...p, videos: newList };
                  }
                  return p;
              }));
            }
          };

          const getScoreInfo = (score) => {
            if (score === 0) return { text: '평가 전', color: 'text-slate-400', bg: 'bg-slate-100' };
            if (score >= 15) return { text: '고위험', color: 'text-red-600', bg: 'bg-red-50' };
            if (score >= 10) return { text: '중위험', color: 'text-orange-600', bg: 'bg-orange-50' };
            return { text: '저위험', color: 'text-green-600', bg: 'bg-green-50' };
          };

          return (
            <div className="flex justify-center bg-slate-200 min-h-screen font-sans">
              <div className="w-full max-w-md bg-slate-50 min-h-screen flex flex-col shadow-2xl relative overflow-hidden">
                
                {/* 🚀 즉시 업로드 진행률 모달 (최상단 z-index 120) */}
                {isSyncing && (
                  <div className="fixed inset-0 z-[120] bg-slate-900/80 backdrop-blur-sm flex items-center justify-center p-6 animate-in fade-in duration-200">
                    <div className="bg-white rounded-2xl p-6 w-full shadow-2xl flex flex-col items-center">
                      <RefreshCw className="w-12 h-12 text-blue-500 animate-spin mb-4" />
                      <h3 className="text-xl font-black text-slate-800 mb-2">서버 통신 중...</h3>
                      <p className="text-sm font-bold text-slate-500 mb-6 text-center h-10 break-keep">
                        {uploadProgress.text}
                      </p>
                      
                      <div className="w-full bg-slate-100 rounded-full h-3 mb-2 overflow-hidden border border-slate-200 shadow-inner">
                        <div 
                          className="bg-blue-600 h-full rounded-full transition-all duration-300 ease-out relative overflow-hidden" 
                          style={{ width: `${uploadProgress.percentage}%` }}
                        >
                          <div className="absolute inset-0 bg-white/20 w-full animate-[shimmer_2s_infinite]"></div>
                        </div>
                      </div>
                      
                      <div className="w-full flex justify-between items-center px-1">
                        <span className="text-xs font-bold text-slate-400">{uploadProgress.current} / {uploadProgress.total} 완료</span>
                        <span className="text-sm font-black text-blue-600">{uploadProgress.percentage}%</span>
                      </div>
                    </div>
                  </div>
                )}

                {/* Toast 알림창 */}
                {toastMessage && !isSyncing && !isSummarizing && !recordingField && (
                  <div className="absolute top-20 left-1/2 -translate-x-1/2 z-50 animate-in slide-in-from-top-4 fade-in duration-300 w-11/12 max-w-sm">
                    <div className="bg-slate-800 text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-3 text-sm font-medium">
                      {toastMessage.includes('중') ? <RefreshCw className="w-5 h-5 text-blue-400 shrink-0 animate-spin" /> : <CheckCircle2 className="w-5 h-5 text-green-400 shrink-0" />}
                      <span className="flex-1 break-keep">{toastMessage}</span>
                    </div>
                  </div>
                )}

                {/* App Header */}
                <header className="bg-blue-600 text-white p-4 sticky top-0 z-50 shadow-md flex justify-between items-center">
                  <div className="flex items-center gap-2">
                    <ChevronLeft className="w-6 h-6" />
                    <div>
                      <h1 className="text-lg font-bold">현장 조사표 작성</h1>
                      {lastSyncTime && (
                        <div className="text-[10px] text-blue-200 flex items-center gap-1 mt-0.5">
                          <Cloud className="w-3 h-3" /> 최근 동기화: {lastSyncTime}
                        </div>
                      )}
                    </div>
                  </div>
                  
                  <div className="flex items-center gap-2">
                    <button 
                      onClick={handleReset}
                      disabled={isSyncing || isSummarizing}
                      className="flex items-center gap-1 text-sm font-medium px-3 py-1.5 rounded-lg transition-colors bg-blue-500 hover:bg-blue-400 active:scale-95 disabled:opacity-50"
                      title="새로 작성하기"
                    >
                      <RefreshCw className="w-4 h-4" /> 초기화
                    </button>
                    
                    <button 
                      onClick={handleManualSave}
                      disabled={isSyncing || isSummarizing}
                      className={`flex items-center gap-1 text-sm font-medium px-3 py-1.5 rounded-lg transition-colors disabled:opacity-50 ${isSyncing ? 'bg-blue-800 text-blue-300' : 'bg-blue-700 hover:bg-blue-800 active:scale-95'}`}
                    >
                      {isSyncing ? <RefreshCw className="w-4 h-4 animate-spin" /> : <Save className="w-4 h-4" />}
                      {isSyncing ? '저장중' : '최종저장'}
                    </button>
                  </div>
                </header>

                {/* Main Content */}
                <main className="flex-1 overflow-y-auto p-4 pb-24 space-y-6">
                  <div className="bg-blue-50 text-blue-800 p-3 rounded-lg text-sm flex gap-2 items-start border border-blue-100">
                    <AlertCircle className="w-5 h-5 shrink-0 mt-0.5" />
                    <div className="flex-1">
                      <p className="mb-1">작성하신 데이터와 사진/동영상은 <strong>구글 스프레드시트 및 드라이브</strong>에 자동 동기화됩니다.</p>
                    </div>
                  </div>

                  {/* 단위사업체 (대분류) 최상단 고정 */}
                  <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-300">
                    <label className="block text-sm font-bold text-slate-800 mb-2">
                      <span className="text-blue-600">■</span> 단위사업체 명 (대분류)
                    </label>
                    <div className="flex gap-2">
                      <select 
                        className="p-3 bg-slate-50 border border-slate-300 rounded-lg focus:outline-none focus:border-blue-500 font-bold w-[76px] shrink-0 text-center text-slate-700"
                        value={category}
                        onChange={(e) => setCategory(e.target.value)}
                      >
                        <option value="">선택</option>
                        {['정', '이', '박', '김', '조', '안', '윤', '강', '서'].map(c => (
                          <option key={c} value={c}>{c}</option>
                        ))}
                      </select>
                      
                      {/* 🔥 연동된 단위사업체 드롭다운 & 직접입력 분기 */}
                      <div className="flex-1 flex flex-col gap-2 min-w-0">
                        <select 
                          className="w-full p-3 bg-slate-50 border border-slate-300 rounded-lg focus:outline-none focus:border-blue-500 font-bold text-slate-700 truncate"
                          value={isCustomCompany ? 'custom' : (fetchedCompanies.includes(companyName) ? companyName : (companyName ? 'custom' : ''))}
                          onChange={(e) => {
                            if (e.target.value === 'custom') {
                              setIsCustomCompany(true);
                              setCompanyName('');
                            } else {
                              setIsCustomCompany(false);
                              setCompanyName(e.target.value);
                            }
                          }}
                        >
                          <option value="">단위사업체 선택 (시트 연동됨)</option>
                          {fetchedCompanies.map((c, i) => (
                            <option key={i} value={c}>{c}</option>
                          ))}
                          <option value="custom">직접 입력...</option>
                        </select>

                        {isCustomCompany && (
                          <input 
                            type="text" 
                            placeholder="예: 현대자동차 울산공장" 
                            className="w-full p-3 bg-white border border-slate-300 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/50 font-bold shadow-sm"
                            value={companyName}
                            onChange={(e) => setCompanyName(e.target.value)}
                          />
                        )}
                      </div>
                    </div>
                  </div>

                  {processes.map((process, index) => {
                    const score = process.workload * process.frequency;
                    const scoreInfo = getScoreInfo(score);
                    const safePhotos = process.photos || [];
                    const safeVideos = process.videos || [];

                    // 현재 선택된 사업체에 해당하는 공정 목록 필터링
                    const availableProcesses = fetchedProcessMap[companyName] || [];

                    return (
                      <div key={process.id} className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        {/* 공정 헤더 */}
                        <div className="bg-slate-100 p-3 border-b border-slate-200 flex justify-between items-center">
                          <div className="flex items-center gap-2">
                            <span className="bg-slate-800 text-white text-xs font-bold w-6 h-6 rounded-full flex items-center justify-center shrink-0">{index + 1}</span>
                            
                            {/* 🔥 공정명 드롭다운 & 직접입력 */}
                            <div className="flex flex-col gap-1.5 w-48">
                              <select 
                                className="bg-transparent font-bold text-slate-800 focus:outline-none text-sm w-full truncate border-b border-slate-300/50 pb-1"
                                value={process.isCustomProcess ? 'custom' : (availableProcesses.includes(process.processName) ? process.processName : (process.processName ? 'custom' : ''))}
                                onChange={(e) => {
                                  if (e.target.value === 'custom') {
                                    updateProcess(process.id, 'isCustomProcess', true);
                                    updateProcess(process.id, 'processName', '');
                                  } else {
                                    updateProcess(process.id, 'isCustomProcess', false);
                                    updateProcess(process.id, 'processName', e.target.value);
                                  }
                                }}
                              >
                                <option value="">공정 선택</option>
                                {availableProcesses.map((p, i) => (
                                  <option key={i} value={p}>{p}</option>
                                ))}
                                <option value="custom">직접 입력...</option>
                              </select>
                              
                              {process.isCustomProcess && (
                                <input 
                                  type="text" 
                                  placeholder="공정명 직접 입력" 
                                  className="bg-white border border-slate-300 rounded px-2 py-1.5 text-xs font-bold text-slate-800 focus:outline-blue-500 w-full shadow-sm"
                                  value={process.processName}
                                  onChange={(e) => updateProcess(process.id, 'processName', e.target.value)}
                                />
                              )}
                            </div>
                          </div>
                          <button onClick={() => removeProcess(process.id)} className="p-1.5 text-slate-400 hover:text-red-500 rounded-lg"><Trash2 className="w-5 h-5" /></button>
                        </div>

                        <div className="p-4 space-y-5">
                          {/* 1. 현장 사진 첨부 */}
                          <div>
                            <div className="flex items-center justify-between mb-2">
                              <label className="block text-sm font-semibold text-slate-700 flex items-center gap-1"><span className="text-blue-500">1.</span> 현장 사진 첨부</label>
                              <span className="text-xs text-slate-400 font-medium">{safePhotos.length}장 / 최대 10장</span>
                            </div>
                            <div className="grid grid-cols-2 gap-3">
                              {safePhotos.map((photoItem, pIdx) => {
                                const srcStr = typeof photoItem === 'string' ? photoItem : photoItem.base64;
                                return (
                                  <div key={pIdx} className="relative aspect-square bg-slate-100 rounded-xl overflow-hidden border border-slate-200">
                                    <img src={srcStr} className="w-full h-full object-cover" />
                                    {photoItem.isUploaded && (
                                      <div className="absolute top-2 left-2 bg-green-500/90 text-white px-2 py-0.5 rounded-md text-[10px] font-bold shadow-sm backdrop-blur-sm flex items-center gap-1">
                                        <Cloud className="w-3 h-3" /> 드라이브 저장됨
                                      </div>
                                    )}
                                    <button onClick={() => removeMedia(process.id, pIdx, 'photo')} className="absolute top-2 right-2 bg-red-500 text-white p-1.5 rounded-full shadow-md"><Trash2 className="w-4 h-4" /></button>
                                  </div>
                                )
                              })}
                              {safePhotos.length < 10 && (
                                <label className="aspect-square bg-slate-100 border-2 border-dashed border-slate-300 rounded-xl flex flex-col items-center justify-center text-slate-400 hover:bg-slate-50 cursor-pointer transition-colors relative">
                                  <Camera className="w-8 h-8 mb-2" />
                                  <span className="text-xs font-medium text-center">사진 촬영<br/>(자동 압축됨)</span>
                                  <input type="file" accept="image/*" capture="environment" className="hidden" onChange={(e) => handleMediaCapture(e, process.id, 'photo')} />
                                </label>
                              )}
                            </div>
                          </div>

                          {/* 2. 작업내용 */}
                          <div className="pt-2 border-t border-slate-100">
                            <div className="flex items-center justify-between mb-1.5">
                              <label className="text-sm font-semibold text-slate-700 flex items-center gap-1">
                                <span className="text-blue-500">2.</span> 작업내용
                              </label>
                              <div className="flex items-center gap-1.5">
                                <button 
                                  onClick={() => updateProcess(process.id, 'workContent', '')}
                                  className="flex items-center gap-1 px-2 py-1.5 rounded-full text-[11px] font-bold bg-slate-100 text-slate-500 hover:bg-red-50 hover:text-red-500 transition-colors shadow-sm border border-slate-200"
                                >
                                  <Trash2 className="w-3.5 h-3.5" /> 삭제
                                </button>
                                <button 
                                  onClick={() => toggleRecording(process.id, 'workContent')}
                                  disabled={isSummarizing && recordingField !== `${process.id}-workContent`}
                                  className={`flex items-center gap-1.5 px-3 py-1.5 rounded-full text-[11px] font-bold transition-all shadow-sm ${
                                    recordingField === `${process.id}-workContent` 
                                      ? 'bg-red-50 text-red-600 border border-red-200 animate-pulse ring-2 ring-red-200' 
                                      : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 active:bg-slate-100'
                                  }`}
                                >
                                  {recordingField === `${process.id}-workContent` ? (
                                    <><div className="w-2 h-2 bg-red-600 rounded-full animate-ping"></div> 녹음 종료</>
                                  ) : (
                                    <><Mic className="w-3.5 h-3.5 text-blue-500" /> 음성 요약</>
                                  )}
                                </button>
                              </div>
                            </div>
                            <textarea 
                              rows="4" placeholder="주요 작업 내용을 직접 입력하거나, 우측의 마이크를 눌러 회의록을 자동 요약하세요."
                              className={`w-full p-2.5 bg-slate-50 border rounded-lg text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 resize-none transition-colors ${
                                recordingField === `${process.id}-workContent` ? 'border-red-300 bg-red-50/30' : 'border-slate-200'
                              }`}
                              value={process.workContent} onChange={(e) => updateProcess(process.id, 'workContent', e.target.value)}
                            />
                          </div>

                          {/* 3. 작업시간 (칩 UI) */}
                          <div className="bg-slate-50 p-3 rounded-xl border border-slate-200 space-y-3">
                            <label className="block text-sm font-semibold text-slate-700 flex items-center gap-1">
                              <span className="text-blue-500">3.</span> 작업시간
                            </label>
                            
                            <div>
                              <div className="text-xs font-bold text-slate-500 mb-1.5">시작 시간 (업무)</div>
                              <div className="flex flex-wrap gap-1.5">
                                {WORK_START_HOURS.map(h => (
                                  <button key={`start-${h}`} onClick={() => updateProcess(process.id, 'workTimeStart', h)} className={`px-2 py-1 text-xs rounded-md border transition-colors ${process.workTimeStart === h ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-600 border-slate-300 hover:bg-slate-100'}`}>{h}</button>
                                ))}
                              </div>
                            </div>
                            <div>
                              <div className="text-xs font-bold text-slate-500 mb-1.5 mt-2">종료 시간 (업무)</div>
                              <div className="flex flex-wrap gap-1.5">
                                {WORK_END_HOURS.map(h => (
                                  <button key={`end-${h}`} onClick={() => updateProcess(process.id, 'workTimeEnd', h)} className={`px-2 py-1 text-xs rounded-md border transition-colors ${process.workTimeEnd === h ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-600 border-slate-300 hover:bg-slate-100'}`}>{h}</button>
                                ))}
                              </div>
                            </div>

                            <div className="pt-2 border-t border-slate-200">
                              <div className="text-xs font-bold text-slate-500 mb-1.5">점심 시작</div>
                              <div className="flex flex-wrap gap-1.5">
                                {LUNCH_START_HOURS.map(h => (
                                  <button key={`l-start-${h}`} onClick={() => updateProcess(process.id, 'lunchTimeStart', h)} className={`px-2 py-1 text-xs rounded-md border transition-colors ${process.lunchTimeStart === h ? 'bg-orange-500 text-white border-orange-500' : 'bg-white text-slate-600 border-slate-300 hover:bg-slate-100'}`}>{h}</button>
                                ))}
                              </div>
                            </div>
                            <div>
                              <div className="text-xs font-bold text-slate-500 mb-1.5 mt-2">점심 종료</div>
                              <div className="flex flex-wrap gap-1.5">
                                {LUNCH_END_HOURS.map(h => (
                                  <button key={`l-end-${h}`} onClick={() => updateProcess(process.id, 'lunchTimeEnd', h)} className={`px-2 py-1 text-xs rounded-md border transition-colors ${process.lunchTimeEnd === h ? 'bg-orange-500 text-white border-orange-500' : 'bg-white text-slate-600 border-slate-300 hover:bg-slate-100'}`}>{h}</button>
                                ))}
                              </div>
                            </div>

                            <div className="pt-2 border-t border-slate-200">
                              <div className="text-xs font-bold text-slate-500 mb-1.5">추가 / 직접 작성</div>
                              <input 
                                type="text" placeholder="야간교대 등 기타 시간 직접 입력 (선택사항)" 
                                className="w-full p-2 bg-white border border-slate-300 rounded-lg text-sm focus:outline-none focus:border-blue-500"
                                value={process.workTimeManual} onChange={(e) => updateProcess(process.id, 'workTimeManual', e.target.value)}
                              />
                            </div>
                          </div>

                          {/* 4. 작업정보 (음성요약과 직접작성 분리) */}

                            <div className="flex items-center justify-between mb-1.5">
                              <label className="text-sm font-semibold text-slate-700 flex items-center gap-1">
                                <span className="text-blue-500">4.</span> 작업정보
                              </label>
                            </div>
                            
                            <div className="space-y-4">
                              {/* 4-1. 음성 요약 영역 */}

                                <div className="flex items-center justify-between mb-2">
                                  <span className="text-xs font-bold text-blue-800">🎙️ AI 음성 요약</span>
                                  <div className="flex items-center gap-1.5">
                                    <button 
                                      onClick={() => updateProcess(process.id, 'workInfo', '')}
                                      className="flex items-center gap-1 px-2 py-1.5 rounded-full text-[10px] font-bold bg-white text-slate-500 hover:bg-red-50 hover:text-red-500 transition-colors shadow-sm border border-slate-200"
                                    >
                                      <Trash2 className="w-3 h-3" /> 삭제
                                    </button>
                                    <button 
                                      onClick={() => toggleRecording(process.id, 'workInfo')}
                                      disabled={isSummarizing && recordingField !== `${process.id}-workInfo`}
                                      className={`flex items-center gap-1.5 px-3 py-1.5 rounded-full text-[10px] font-bold transition-all shadow-sm ${
                                        recordingField === `${process.id}-workInfo` 
                                          ? 'bg-red-50 text-red-600 border border-red-200 animate-pulse ring-2 ring-red-200' 
                                          : 'bg-blue-600 text-white border border-blue-700 hover:bg-blue-700 active:scale-95'
                                      }`}
                                    >
                                      {recordingField === `${process.id}-workInfo` ? (
                                        <><div className="w-2 h-2 bg-red-600 rounded-full animate-ping"></div> 녹음 종료</>
                                      ) : (
                                        <><Mic className="w-3.5 h-3.5 text-white" /> 음성 요약</>
                                      )}
                                    </button>
                                  </div>
                                </div>
                                <textarea 
                                  rows="3" placeholder="마이크를 눌러 대화를 요약하면 이곳에 정리됩니다."
                                  className={`w-full p-2.5 bg-white border rounded-lg text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 resize-none transition-colors ${
                                    recordingField === `${process.id}-workInfo` ? 'border-red-300 bg-red-50' : 'border-blue-200'
                                  }`}
                                  value={process.workInfo} onChange={(e) => updateProcess(process.id, 'workInfo', e.target.value)}
                                />
                              </div>

                              {/* 4-2. 직접 작성 영역 (세분화 됨) */}
                              <div className="bg-slate-50 p-3 rounded-xl border border-slate-200 space-y-4">
                                <div className="flex items-center justify-between border-b border-slate-200 pb-2">
                                  <span className="text-xs font-bold text-slate-700">✍️ 직접 작성 (상세 분류)</span>
                                </div>
                                
                                {/* 1) 작업량 */}
                                <div>
                                  <div className="flex justify-between items-center mb-1.5">
                                    <span className="text-xs font-bold text-slate-600">1) 작업량</span>
                                    <button 
                                      onClick={() => addNestedItem(process.id, 'workloads', { count: '', duration: '' })} 
                                      className="text-[10px] bg-slate-200 text-slate-600 px-2 py-1 rounded-md font-bold hover:bg-slate-300 transition-colors"
                                    >
                                      + 작업량 추가
                                    </button>
                                  </div>
                                  <div className="space-y-2">
                                    {process.workloads?.map((item, idx) => (
                                      <div key={`wl-${idx}`} className="bg-white p-3 border border-slate-200 rounded-lg shadow-sm space-y-2 relative">
                                        <div className="flex items-center justify-between mb-1">
                                          <span className="text-[10px] font-black text-blue-600 bg-blue-50 px-2 py-0.5 rounded-md">작업량 {idx+1}</span>
                                          {idx > 0 && <button onClick={() => removeNestedItem(process.id, 'workloads', idx)} className="text-red-400 hover:text-red-600 p-0.5"><XIcon className="w-4 h-4"/></button>}
                                        </div>
                                        <div className="flex items-center gap-2">
                                          <span className="text-xs font-bold text-slate-600 w-20 shrink-0">상세 작업 횟수</span>
                                          <input type="text" placeholder="예: 10회/일" className="flex-1 text-xs p-2 border border-slate-200 rounded-md focus:outline-blue-500 bg-slate-50" value={item.count} onChange={(e) => updateNestedArray(process.id, 'workloads', idx, 'count', e.target.value)} />
                                        </div>
                                        <div className="flex items-center gap-2">
                                          <span className="text-xs font-bold text-slate-600 w-20 shrink-0">소요 시간</span>
                                          <input type="text" placeholder="예: 2시간" className="flex-1 text-xs p-2 border border-slate-200 rounded-md focus:outline-blue-500 bg-slate-50" value={item.duration} onChange={(e) => updateNestedArray(process.id, 'workloads', idx, 'duration', e.target.value)} />
                                        </div>
                                      </div>
                                    ))}
                                  </div>
                                </div>

                                {/* 2) 중량물 */}
                                <div className="pt-2 border-t border-slate-100">
                                  <div className="flex justify-between items-center mb-1.5">
                                    <span className="text-xs font-bold text-slate-600">2) 중량물 취급</span>
                                    <button 
                                      onClick={() => addNestedItem(process.id, 'heavyObjects', { weight: '', count: '' })} 
                                      className="text-[10px] bg-slate-200 text-slate-600 px-2 py-1 rounded-md font-bold hover:bg-slate-300 transition-colors"
                                    >
                                      + 중량물 추가
                                    </button>
                                  </div>
                                  <div className="space-y-2">
                                    {process.heavyObjects?.map((item, idx) => (
                                      <div key={`ho-${idx}`} className="bg-white p-2 border border-slate-200 rounded-lg shadow-sm space-y-2">
                                        <div className="flex items-center justify-between">
                                          <div className="flex gap-1 flex-1">
                                            {['10kg 미만', '10~25kg', '25kg 이상', '해당없음'].map(w => (
                                              <button 
                                                key={w} 
                                                onClick={() => updateNestedArray(process.id, 'heavyObjects', idx, 'weight', w)} 
                                                className={`flex-1 text-[9px] sm:text-[10px] py-1.5 px-0.5 rounded-md border font-medium transition-colors tracking-tight break-keep ${item.weight === w ? 'bg-blue-500 text-white border-blue-500' : 'bg-slate-50 text-slate-600 border-slate-200 hover:bg-slate-100'}`}
                                              >
                                                {w}
                                              </button>
                                            ))}
                                          </div>
                                          {idx > 0 && <button onClick={() => removeNestedItem(process.id, 'heavyObjects', idx)} className="text-red-400 hover:text-red-600 ml-2 p-1"><XIcon className="w-4 h-4"/></button>}
                                        </div>
                                        <input type="text" placeholder="취급횟수를 입력하세요" className="w-full text-xs p-2 border border-slate-200 rounded-md focus:outline-blue-500" value={item.count} onChange={(e) => updateNestedArray(process.id, 'heavyObjects', idx, 'count', e.target.value)} />
                                      </div>
                                    ))}
                                  </div>
                                </div>

                                {/* 3) 수공구 */}
                                <div className="pt-2 border-t border-slate-100">
                                  <div className="flex justify-between items-center mb-1.5">
                                    <span className="text-xs font-bold text-slate-600">3) 수공구 취급</span>
                                    <button 
                                      onClick={() => addNestedItem(process.id, 'handTools', { weight: '', count: '' })} 
                                      className="text-[10px] bg-slate-200 text-slate-600 px-2 py-1 rounded-md font-bold hover:bg-slate-300 transition-colors"
                                    >
                                      + 수공구 추가
                                    </button>
                                  </div>
                                  <div className="space-y-2">
                                    {process.handTools?.map((item, idx) => (
                                      <div key={`ht-${idx}`} className="bg-white p-2 border border-slate-200 rounded-lg shadow-sm space-y-2">
                                        <div className="flex items-center justify-between">
                                          <div className="flex gap-1 flex-1">
                                            {['10kg 미만', '10~25kg', '25kg 이상', '해당없음'].map(w => (
                                              <button 
                                                key={w} 
                                                onClick={() => updateNestedArray(process.id, 'handTools', idx, 'weight', w)} 
                                                className={`flex-1 text-[9px] sm:text-[10px] py-1.5 px-0.5 rounded-md border font-medium transition-colors tracking-tight break-keep ${item.weight === w ? 'bg-blue-500 text-white border-blue-500' : 'bg-slate-50 text-slate-600 border-slate-200 hover:bg-slate-100'}`}
                                              >
                                                {w}
                                              </button>
                                            ))}
                                          </div>
                                          {idx > 0 && <button onClick={() => removeNestedItem(process.id, 'handTools', idx)} className="text-red-400 hover:text-red-600 ml-2 p-1"><XIcon className="w-4 h-4"/></button>}
                                        </div>
                                        <input type="text" placeholder="취급횟수를 입력하세요" className="w-full text-xs p-2 border border-slate-200 rounded-md focus:outline-blue-500" value={item.count} onChange={(e) => updateNestedArray(process.id, 'handTools', idx, 'count', e.target.value)} />
                                      </div>

                                  </div>
                                </div>

                                <div className="pt-2 border-t border-slate-100">
                                  <div className="flex items-center justify-between mb-1.5">
                                    <span className="text-xs font-bold text-slate-600">4) 추가 정보 (직접 작성)</span>
                                    <button 
                                        onClick={() => updateProcess(process.id, 'workInfoManual', '')}
                                        className="text-[10px] text-slate-400 hover:text-red-500 transition-colors"
                                      >
                                        내용 지우기
                                    </button>
                                  </div>
                                  <textarea 
                                    rows="2" placeholder="기타 특이사항을 직접 타이핑하세요."
                                    className="w-full p-2 bg-white border border-slate-200 rounded-lg text-xs focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 resize-none shadow-sm"
                                    value={process.workInfoManual || ''} onChange={(e) => updateProcess(process.id, 'workInfoManual', e.target.value)}
                                  />
                                </div>

                              </div>
                            </div>
                          </div>

                          {/* 5. 작업부하 및 빈도 */}
                          <div className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                            <label className="block text-sm font-semibold text-slate-800 mb-4 flex items-center">
                              <span className="text-blue-500 mr-1">5.</span> 작업부하 및 작업빈도
                            </label>

                            <div className="flex gap-2 items-stretch">
                              <div className="w-[45%] flex flex-col">
                                <div className="text-xs font-bold text-slate-700 mb-2 text-center bg-slate-200/70 py-1.5 rounded-lg">작업부하 (A)</div>
                                <div className="flex flex-col gap-1.5 flex-1">
                                  {WORKLOAD_OPTIONS.map(opt => (
                                    <button key={`wl-${opt.value}`} onClick={() => updateProcess(process.id, 'workload', opt.value)}
                                      className={`w-full flex-1 flex items-center justify-between p-2 rounded-lg border transition-colors ${process.workload === opt.value ? 'bg-blue-600 text-white border-blue-600 shadow-md font-bold' : 'bg-white text-slate-700 border-slate-300 hover:bg-slate-50 font-medium'}`}>
                                      <span className="text-xs">{opt.label}</span>
                                      <span className={`w-5 h-5 shrink-0 rounded-full flex items-center justify-center text-[10px] ${process.workload === opt.value ? 'bg-white/20' : 'bg-slate-100 text-slate-500'}`}>{opt.value}</span>
                                    </button>

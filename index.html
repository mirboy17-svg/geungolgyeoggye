<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>모바일 근골조사표 앱</title>
    
    <!-- Tailwind CSS (스타일링) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel (브라우저용 JSX 컴파일러) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 아이콘 컴포넌트 ---
        const Icon = ({ path, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className || "w-6 h-6"}>{path}</svg>
        );
        const ChevronLeft = ({className}) => <Icon className={className} path={<path d="m15 18-6-6 6-6"/>} />;
        const Save = ({className}) => <Icon className={className} path={<><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></>} />;
        const AlertCircle = ({className}) => <Icon className={className} path={<><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>} />;
        const Trash2 = ({className}) => <Icon className={className} path={<><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>} />;
        const Camera = ({className}) => <Icon className={className} path={<><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></>} />;
        const VideoIcon = ({className}) => <Icon className={className} path={<><path d="m22 8-6 4 6 4V8Z"/><rect x="2" y="6" width="14" height="12" rx="2" ry="2"/></>} />;
        const Plus = ({className}) => <Icon className={className} path={<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>} />;
        const CheckCircle2 = ({className}) => <Icon className={className} path={<><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>} />;
        const RefreshCw = ({className}) => <Icon className={className} path={<><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></>} />;
        const Cloud = ({className}) => <Icon className={className} path={<path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/>} />;
        const Mic = ({className}) => <Icon className={className} path={<><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></>} />;
        const Folder = ({className}) => <Icon className={className} path={<><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></>} />;
        const ImageIcon = ({className}) => <Icon className={className} path={<><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></>} />;
        const XIcon = ({className}) => <Icon className={className} path={<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>} />;

        // --- 선택 옵션 ---
        const WORKLOAD_OPTIONS = [
          { value: 1, label: '매우쉬움' },
          { value: 2, label: '쉬움' },
          { value: 3, label: '약간힘듦' },
          { value: 4, label: '힘듦' },
          { value: 5, label: '매우힘듦' }
        ];

        const FREQUENCY_OPTIONS = [
          { value: 1, label: '3개월마다(2~3회/년)' },
          { value: 2, label: '가끔(하루또는1회/2~3일)' },
          { value: 3, label: '자주(1일4시간)' },
          { value: 4, label: '계속(1일4시간이상)' },
          { value: 5, label: '초과근무시간(1일8시간 이상)' }
        ];

        const WORK_START_HOURS = ['06:00', '06:30', '07:00', '07:30', '08:00', '08:30', '09:00', '09:30', '10:00', '10:30', '11:00'];
        const WORK_END_HOURS = ['15:00', '15:30', '16:00', '16:30', '17:00', '17:30', '18:00'];
        const LUNCH_START_HOURS = ['11:00', '11:30', '12:00', '12:30', '13:00'];
        const LUNCH_END_HOURS = ['12:00', '12:30', '13:00', '13:30', '14:00'];

        // 초기 빈 공정 양식
        const emptyProcess = () => ({
          id: 'proc_' + Date.now().toString() + '_' + Math.random().toString(36).substr(2, 9),
          processName: '',
          isCustomProcess: false, 
          workContent: '',
          workTimeStart: '',
          workTimeEnd: '',
          lunchTimeStart: '',
          lunchTimeEnd: '',
          workTimeManual: '',
          workInfo: '',        
          workInfoManual: '',  
          workloads: [{ count: '', duration: '' }],           
          heavyObjects: [{ weight: '', count: '' }],          
          handTools: [{ weight: '', count: '' }],             
          workload: 0,
          frequency: 0,
          photos: [],
          videos: []
        });

        const compressImage = (file) => {
          return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
              const img = new Image();
              img.src = event.target.result;
              img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 854; 
                const MAX_HEIGHT = 854;
                let width = img.width;
                let height = img.height;

                if (width > height) {
                  if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                } else {
                  if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                }
                
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                const dataUrl = canvas.toDataURL('image/jpeg', 0.5);

                canvas.width = 0;
                canvas.height = 0;
                img.src = '';
                
                resolve(dataUrl);
              };
            };
          });
        };

        const summarizeTextWithRetry = async (text, field, retries = 5) => {
          const apiKey = ""; 
          const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
          
          const fieldName = field === 'workContent' ? '작업내용' : '작업정보(취급 무게, 자세, 빈도 등)';
          const systemPrompt = `당신은 최고 수준의 '산업보건 인터뷰 회의록 자동화 AI'입니다. 불필요한 언어는 100% 삭제하고 건조한 보고서용 명사형 문장(~음, ~함)으로 요약하세요.\n[출력 포맷: ${fieldName}에 맞게 구성]\n${field === 'workContent' ? '■ 핵심 요약\n- \n■ 세부 작업 순서\n- ' : '■ 취급 중량 및 빈도\n- \n■ 주요 작업 자세 및 특이사항\n- '}`;

          const payload = { 
            contents: [{ parts: [{ text: `[실제 인터뷰 대화 내용]\n${text}` }] }],
            systemInstruction: { parts: [{ text: systemPrompt }] },
            generationConfig: { temperature: 0.0, maxOutputTokens: 300 }
          };
          
          for (let i = 0; i < retries; i++) {
            try {
              const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
              if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
              const data = await res.json();
              return data.candidates[0].content.parts[0].text.trim();
            } catch (err) {
              if (i === retries - 1) throw err;
              await new Promise(resolve => setTimeout(resolve, Math.pow(2, i) * 1000));
            }
          }
        };

        function MobileApp() {
          const [companyName, setCompanyName] = useState('');
          const [isCustomCompany, setIsCustomCompany] = useState(false); 
          const [category, setCategory] = useState(''); 
          const [processes, setProcesses] = useState([emptyProcess()]);
          const [toastMessage, setToastMessage] = useState('');
          const [isSyncing, setIsSyncing] = useState(false); 
          const [lastSyncTime, setLastSyncTime] = useState('');
          const [uploadProgress, setUploadProgress] = useState({ current: 0, total: 0, text: '', percentage: 0 });

          const [fetchedCompanies, setFetchedCompanies] = useState([]);
          const [fetchedProcessMap, setFetchedProcessMap] = useState({}); 

          const [videoPopupProcessId, setVideoPopupProcessId] = useState(null);
          const [photoPopupProcessId, setPhotoPopupProcessId] = useState(null); 

          // 💡 전송 취소를 위한 AbortController Ref 추가
          const abortControllersRef = useRef({});
          const globalAbortControllerRef = useRef(null);

          const [recordingField, setRecordingField] = useState(null); 
          const [isSummarizing, setIsSummarizing] = useState(false);
          const recognitionRef = useRef(null);
          const transcriptRef = useRef('');
          const currentSessionTextRef = useRef(''); 
          const manualStopRef = useRef(false); 
          const recordingTimerRef = useRef(null); 

          const TARGET_FOLDER_ID = '16DTHs4okhpe7dgXStwkp1KuhI3APU0JI';
          const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyoy87S02bO4eUFmoH89AxFsxjNmWzCrDtnkI7ZPOBuBJNND0INUA489XOpvpILNK9J/exec'; 

          useEffect(() => {
            const fetchSpreadsheetData = async () => {
              try {
                const SHEET_ID = '1J9MkuVO5cCMhpEZFVZrOnNPMJf-quZlBpr6YzrgBfbo';
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=0`;
                const response = await fetch(url);
                if (!response.ok) throw new Error('Failed to fetch CSV');
                const csvText = await response.text();

                const rows = [];
                let row = [];
                let inQuotes = false;
                let val = '';
                for (let i = 0; i < csvText.length; i++) {
                  const char = csvText[i];
                  if (char === '"') { inQuotes = !inQuotes; } 
                  else if (char === ',' && !inQuotes) { row.push(val.trim()); val = ''; } 
                  else if (char === '\n' && !inQuotes) { row.push(val.trim()); rows.push(row); row = []; val = ''; } 
                  else { val += char; }
                }
                row.push(val.trim());
                rows.push(row);

                const companiesSet = new Set();
                const pMap = {};

                rows.forEach((r, idx) => {
                  if (idx === 0) return; 
                  const comp = r[0];
                  const proc = r[1];
                  if (comp) {
                    companiesSet.add(comp);
                    if (!pMap[comp]) pMap[comp] = [];
                    if (proc && !pMap[comp].includes(proc)) pMap[comp].push(proc);
                  }
                });

                setFetchedCompanies(Array.from(companiesSet));
                setFetchedProcessMap(pMap);
              } catch (error) {}
            };
            fetchSpreadsheetData();
          }, []);

          const isInitialMount = useRef(true);
          useEffect(() => {
            try {
              const savedCompany = localStorage.getItem('localCompanyName');
              if (savedCompany) setCompanyName(savedCompany);

              const savedCategory = localStorage.getItem('localCategory'); 
              if (savedCategory) setCategory(savedCategory);

              const savedData = localStorage.getItem('localProcessData');
              if (savedData) {
                const parsedData = JSON.parse(savedData);
                const safeData = parsedData.map(p => ({
                  ...emptyProcess(),
                  ...p,
                  workloads: p.workloads?.length ? p.workloads : [{ count: '', duration: '' }],
                  heavyObjects: p.heavyObjects?.length ? p.heavyObjects : [{ weight: '', count: '' }],
                  handTools: p.handTools?.length ? p.handTools : [{ weight: '', count: '' }],
                  photos: Array.isArray(p.photos) ? p.photos.filter(photo => photo !== null) : [],
                  videos: Array.isArray(p.videos) ? p.videos : []
                }));
                setProcesses(safeData);
              }
            } catch (error) {
              localStorage.removeItem('localProcessData');
            }
          }, []);

          useEffect(() => {
            if (isInitialMount.current) {
              isInitialMount.current = false;
              return; 
            }
            if (processes.length > 0) {
              // 💡 저장 시 임시 preview URL은 용량 문제로 제외하고 저장 (base64만 저장)
              const dataToSave = processes.map(p => ({
                ...p,
                photos: p.photos.map(photo => typeof photo === 'object' && photo ? { ...photo, previewUrl: null } : photo),
                videos: p.videos.map(video => typeof video === 'object' && video ? { ...video, previewUrl: null } : video)
              }));
              localStorage.setItem('localProcessData', JSON.stringify(dataToSave));
            }
          }, [processes]);

          useEffect(() => {
            if (companyName && fetchedCompanies.length > 0 && !fetchedCompanies.includes(companyName)) {
              setIsCustomCompany(true);
            }
          }, [companyName, fetchedCompanies]);

          useEffect(() => {
            if (toastMessage && !isSyncing && !isSummarizing && !recordingField) {
              const timer = setTimeout(() => setToastMessage(''), 3000);
              return () => clearTimeout(timer);
            }
          }, [toastMessage, isSyncing, isSummarizing, recordingField]);

          const executeSummary = async (textToSummarize, processId, field) => {
            if (textToSummarize.length === 0) return setToastMessage('⚠️ 입력된 음성이 없습니다.');
            setToastMessage('⏳ AI가 대화 내용을 즉시 요약 중입니다...');
            setIsSummarizing(true);
            try {
              const summary = await summarizeTextWithRetry(textToSummarize, field);
              setProcesses(prev => prev.map(p => {
                if (p.id === processId) {
                  const existingText = p[field] ? p[field] + '\n' : '';
                  return { ...p, [field]: existingText + summary };
                }
                return p;
              }));
              setToastMessage('✨ 요약 완료!');
            } catch (error) {
              setToastMessage('❌ 요약 오류 발생. 원문을 입력합니다.');
              setProcesses(prev => prev.map(p => {
                if (p.id === processId) {
                  const existingText = p[field] ? p[field] + '\n' : '';
                  return { ...p, [field]: existingText + "[음성 원문]\n" + textToSummarize };
                }
                return p;
              }));
            } finally {
              setIsSummarizing(false);
            }
          };

          const toggleRecording = async (processId, field) => {
            const fieldKey = `${processId}-${field}`;
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

            if (recordingField === fieldKey) {
              manualStopRef.current = true;
              if (recordingTimerRef.current) clearTimeout(recordingTimerRef.current);
              
              const finalText = (transcriptRef.current + ' ' + currentSessionTextRef.current).trim();
              if (recognitionRef.current) {
                recognitionRef.current.onend = null; 
                recognitionRef.current.abort(); 
              }
              setRecordingField(null);
              transcriptRef.current = '';
              currentSessionTextRef.current = '';
              executeSummary(finalText, processId, field);
            } 
            else {
              if (!SpeechRecognition) return alert('해당 브라우저에서는 음성 인식을 지원하지 않습니다.');
              try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                stream.getTracks().forEach(track => track.stop()); 
              } catch (err) { return alert("마이크 권한을 허용으로 변경해주세요."); }

              manualStopRef.current = false; 
              transcriptRef.current = '';
              currentSessionTextRef.current = '';
              if (recognitionRef.current) recognitionRef.current.abort();
              if (recordingTimerRef.current) clearTimeout(recordingTimerRef.current);

              recordingTimerRef.current = setTimeout(() => {
                setToastMessage('⏳ 최대 녹음 시간(5분) 도달. 요약 시작.');
                manualStopRef.current = true;
                const finalText = (transcriptRef.current + ' ' + currentSessionTextRef.current).trim();
                if (recognitionRef.current) { recognitionRef.current.onend = null; recognitionRef.current.abort(); }
                setRecordingField(null);
                transcriptRef.current = '';
                currentSessionTextRef.current = '';
                executeSummary(finalText, processId, field);
              }, 5 * 60 * 1000); 

              const recognition = new SpeechRecognition();
              recognition.lang = 'ko-KR';
              recognition.continuous = false; 
              recognition.interimResults = true;

              recognition.onresult = (event) => {
                let sessionText = '';
                for (let i = 0; i < event.results.length; ++i) sessionText += event.results[i][0].transcript;
                currentSessionTextRef.current = sessionText;
              };

              recognition.onerror = (event) => {
                if (event.error === 'not-allowed' || event.error === 'service-not-allowed') {
                  manualStopRef.current = true;
                  setRecordingField(null);
                }
              };

              recognition.onend = () => {
                if (currentSessionTextRef.current.trim()) {
                  transcriptRef.current += currentSessionTextRef.current.trim() + ' ';
                  currentSessionTextRef.current = '';
                }
                if (!manualStopRef.current) { try { recognition.start(); } catch (e) {} }
              };

              try {
                recognition.start();
                recognitionRef.current = recognition;
                setRecordingField(fieldKey);
                setToastMessage('🎙️ 대화 녹음 중...');
              } catch(e) { console.error(e); }
            }
          };

          // 🚀 💡 [핵심] 비동기 백그라운드 독립 전송 로직 (화면 멈춤 없음)
          const handleMediaCaptureBackground = async (e, processId, type) => {
            const file = e.target.files[0];
            if (!file) return;

            const maxSizeMB = type === 'photo' ? 10 : 30; 
            if (file.size > maxSizeMB * 1024 * 1024) {
              alert(`⚠️ 파일 용량이 너무 큽니다! (${(file.size / 1024 / 1024).toFixed(1)}MB)\n화질을 낮춰주세요.`);
              e.target.value = null;
              return;
            }

            // 1. UI에 즉시 반영할 임시 ID와 미리보기 URL 생성 (속도 체감 0.1초)
            const tempId = Date.now().toString() + Math.random().toString(36).substring(7);
            const previewUrl = URL.createObjectURL(file);

            // 💡 취소 컨트롤러 생성 및 저장
            const abortController = new AbortController();
            abortControllersRef.current[tempId] = abortController;

            setProcesses(prev => prev.map(p => {
                if (p.id === processId) {
                    const newItem = { id: tempId, isUploaded: false, isUploading: true, previewUrl: previewUrl, base64: null };
                    return type === 'photo'
                        ? { ...p, photos: [...(p.photos || []), newItem] }
                        : { ...p, videos: [...(p.videos || []), newItem] };
                }
                return p;
            }));

            // 백그라운드 함수 실행 (await 하지 않음 = 화면 차단 안 함)
            const processAndUpload = async () => {
                let currentBase64 = null;
                try {
                    // 압축 또는 파일 읽기 진행
                    if (type === 'photo') {
                        currentBase64 = await compressImage(file);
                    } else {
                        currentBase64 = await new Promise((resolve) => {
                            const reader = new FileReader();
                            reader.onloadend = () => resolve(reader.result);
                            reader.readAsDataURL(file);
                        });
                    }

                    const currentProcess = processes.find(p => p.id === processId);
                    const pName = currentProcess?.processName || '미지정공정';
                    const fileExt = type === 'photo' ? 'jpg' : 'mp4';
                    const catPrefix = category ? `(${category})` : '';
                    const fileName = `${catPrefix}${companyName || '미지정사업체'}_${pName}_${type === 'photo'?'사진':'동영상'}_${tempId.substring(0,4)}.${fileExt}`;

                    if (GAS_WEB_APP_URL.includes('여기에_복사한')) {
                        throw new Error("구글 스크립트 URL이 설정되지 않았습니다.");
                    }

                    // 구글 드라이브로 개별 전송
                    const fetchUrl = GAS_WEB_APP_URL + (GAS_WEB_APP_URL.includes('?') ? '&' : '?') + 't=' + Date.now();
                    const response = await fetch(fetchUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({
                            type: 'media',
                            folderId: TARGET_FOLDER_ID,
                            fileName: fileName,
                            fileData: currentBase64
                        }),
                        signal: abortController.signal // 🔥 취소 신호 연결
                    });

                    const result = await response.json();
                    if (result.status !== "success") throw new Error(result.message);

                    // 완료 시 해당 사진만 상태 업데이트 (로딩 뱅글뱅글 제거)
                    setProcesses(prev => prev.map(p => {
                        if (p.id === processId) {
                            const list = type === 'photo' ? p.photos : p.videos;
                            const updatedList = list.map(item => item.id === tempId ? { ...item, isUploaded: true, isUploading: false, base64: currentBase64, fileName, previewUrl: null } : item);
                            return { ...p, [type === 'photo' ? 'photos' : 'videos']: updatedList };
                        }
                        return p;
                    }));

                    delete abortControllersRef.current[tempId]; // 완료 후 정리

                } catch (error) {
                    if (error.name === 'AbortError') {
                        console.log('업로드 취소됨');
                        return; // 사용자가 취소한 경우 조용히 종료
                    }
                    console.error("백그라운드 업로드 실패:", error);
                    // 실패 시 임시 저장 상태로 전환하여 나중에 최종저장 때 다시 쏘도록 함
                    setProcesses(prev => prev.map(p => {
                        if (p.id === processId) {
                            const list = type === 'photo' ? p.photos : p.videos;
                            const updatedList = list.map(item => item.id === tempId ? { ...item, isUploaded: false, isUploading: false, uploadFailed: true, base64: currentBase64, previewUrl: null } : item);
                            return { ...p, [type === 'photo' ? 'photos' : 'videos']: updatedList };
                        }
                        return p;
                    }));
                }
            };

            processAndUpload(); // 백그라운드 던져놓기
            e.target.value = null; // 인풋 초기화
          };

          // 💡 [신규] 개별 미디어 전송 취소 함수
          const cancelUpload = (processId, mediaId, type) => {
            // 통신 강제 중단
            if (abortControllersRef.current[mediaId]) {
              abortControllersRef.current[mediaId].abort();
              delete abortControllersRef.current[mediaId];
            }

            // 화면에서 해당 미디어 즉시 삭제
            setProcesses(prev => prev.map(p => {
              if (p.id === processId) {
                const list = type === 'photo' ? p.photos : p.videos;
                const target = list.find(item => item.id === mediaId);
                if (target && target.previewUrl) {
                  URL.revokeObjectURL(target.previewUrl);
                }
                const updatedList = list.filter(item => item.id !== mediaId);
                return { ...p, [type === 'photo' ? 'photos' : 'videos']: updatedList };
              }
              return p;
            }));
            setToastMessage('🚫 전송이 취소되었습니다.');
          };

          // 🚀 최종 텍스트 데이터 전송 (업로드 안 된 미디어가 있으면 검사)
          const handleManualSave = () => {
            // 업로드 중인 파일이 있는지 확인
            const isAnyUploading = processes.some(p =>
              (p.photos || []).some(photo => photo && typeof photo === 'object' && photo.isUploading) ||
              (p.videos || []).some(video => video && typeof video === 'object' && video.isUploading)
            );

            if (isAnyUploading) {
              alert("⏳ 현재 미디어 파일이 백그라운드에서 구글 서버로 업로드 중입니다.\n사진 위 로딩 아이콘이 사라지면 다시 최종 저장을 눌러주세요.");
              return;
            }
            saveToServer(processes, false);
          };

          const saveToServer = async (data, isAutoSave = false) => {
            localStorage.setItem('localProcessData', JSON.stringify(data));
            localStorage.setItem('localCompanyName', companyName);
            localStorage.setItem('localCategory', category); 
            if (isAutoSave) {
              setToastMessage('📱 기기 내부 임시 저장 완료');
              return;
            }

            if (GAS_WEB_APP_URL.includes('여기에_복사한')) {
              alert("소스코드에 구글 앱스 스크립트 URL이 입력되지 않았습니다!");
              return;
            }

            // 💡 전체 동기화용 취소 컨트롤러 생성
            globalAbortControllerRef.current = new AbortController();
            const signal = globalAbortControllerRef.current.signal;

            setIsSyncing(true);
            
            try {
              const mediaQueue = [];
              const nowForName = new Date();
              const timeStr = `${nowForName.getHours()}${nowForName.getMinutes()}${nowForName.getSeconds()}`;

              const fetchUrl = GAS_WEB_APP_URL + (GAS_WEB_APP_URL.includes('?') ? '&' : '?') + 't=' + Date.now();
              const catPrefix = category ? `(${category})` : '';
              
              const spreadsheetPayload = {
                type: 'spreadsheet',
                folderId: TARGET_FOLDER_ID,
                spreadsheetName: `${catPrefix}${companyName || '미지정사업체'}`,
                processes: data.map((p, index) => {
                  const processName = p.processName || `미지정_공정_${index + 1}`;
                  const formattedWorkTime = `업무: ${p.workTimeStart || '?'}~${p.workTimeEnd || '?'} / 점심: ${p.lunchTimeStart || '?'}~${p.lunchTimeEnd || '?'} / 기타: ${p.workTimeManual}`;
                  
                  const validWorkloads = p.workloads?.filter(item => item.count || item.duration);
                  const strWorkloads = validWorkloads?.length > 0 
                    ? validWorkloads.map((item, i) => `${i+1}. 횟수: ${item.count||'미입력'}, 소요시간: ${item.duration||'미입력'}`).join('\n')
                    : '해당없음';
                  
                  const validHeavyObjects = p.heavyObjects?.filter(item => item.weight || item.count);
                  const strHeavyObjects = validHeavyObjects?.length > 0 
                    ? validHeavyObjects.map((item, i) => `${i+1}. 무게: ${item.weight||'미선택'}, 취급횟수: ${item.count||'미입력'}`).join('\n')
                    : '해당없음';

                  const validHandTools = p.handTools?.filter(item => item.weight || item.count);
                  const strHandTools = validHandTools?.length > 0 
                    ? validHandTools.map((item, i) => `${i+1}. 무게: ${item.weight||'미선택'}, 취급횟수: ${item.count||'미입력'}`).join('\n')
                    : '해당없음';
                  
                  // 통신 실패로 아직 올라가지 못한 파일들만 모아서 재전송 큐에 넣기
                  (p.photos || []).forEach((photoItem, i) => {
                    const fileName = `${catPrefix}${companyName || '미지정사업체'}_${processName}_사진${i + 1}.jpg`;
                    if (typeof photoItem === 'string') {
                      mediaQueue.push({ type: 'media', folderId: TARGET_FOLDER_ID, fileName: fileName, fileData: photoItem });
                    } else if (photoItem && !photoItem.isUploaded && photoItem.base64) {
                      mediaQueue.push({ type: 'media', folderId: TARGET_FOLDER_ID, fileName: fileName, fileData: photoItem.base64 });
                    }
                  });
                  (p.videos || []).forEach((videoItem, i) => {
                    const fileName = `${catPrefix}${companyName || '미지정사업체'}_${processName}_동영상${i + 1}.mp4`;
                     if (typeof videoItem === 'string') {
                      mediaQueue.push({ type: 'media', folderId: TARGET_FOLDER_ID, fileName: fileName, fileData: videoItem });
                    } else if (videoItem && !videoItem.isUploaded && videoItem.base64) {
                      mediaQueue.push({ type: 'media', folderId: TARGET_FOLDER_ID, fileName: fileName, fileData: videoItem.base64 });
                    }
                  });

                  return {
                    sheetName: processName,
                    info: {
                      "단위사업체": companyName || '미지정사업체',
                      "공정명": processName,
                      "작업내용": p.workContent || '미입력',
                      "작업시간": formattedWorkTime,
                      "작업정보 (음성요약)": p.workInfo || '해당없음',
                      "작업량": strWorkloads,
                      "중량물 취급": strHeavyObjects,
                      "수공구 취급": strHandTools,
                      "작업정보 (기타 추가)": p.workInfoManual || '해당없음',
                      "작업부하(A)": p.workload,
                      "작업빈도(B)": p.frequency,
                      "총점": p.workload * p.frequency
                    }
                  };
                })
              };

              const totalTasks = 1 + mediaQueue.length;
              let completedTasks = 0;

              const updateProgress = (text) => {
                const percentage = Math.round((completedTasks / totalTasks) * 100);
                setUploadProgress({ current: completedTasks, total: totalTasks, text, percentage });
              };

              updateProgress('☁️ 조사표 텍스트 데이터를 전송 중...');
              
              let response = await fetch(fetchUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(spreadsheetPayload),
                signal // 🔥 취소 신호 연결
              });
              let result = await response.json();
              if (result.status !== "success") throw new Error(result.message);

              completedTasks++;
              
              if (mediaQueue.length > 0) {
                updateProgress('☁️ 미전송 미디어 파일 동기화 중...');
                
                // 🔥 [속도 최적화] 여러 개를 동시에 한꺼번에 쏘는 방식(병렬 처리)
                const uploadPromises = mediaQueue.map(async (mediaItem) => {
                  const mediaResponse = await fetch(fetchUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(mediaItem),
                    signal // 🔥 취소 신호 연결
                  });
                  const mediaResult = await mediaResponse.json();
                  if (mediaResult.status !== "success") throw new Error(`업로드 실패: ${mediaItem.fileName}`);
                  
                  completedTasks++;
                  const percentage = Math.round((completedTasks / totalTasks) * 100);
                  setUploadProgress({ 
                    current: completedTasks, 
                    total: totalTasks, 
                    text: `누락 파일 병렬 업로드 중... (${completedTasks}/${totalTasks})`, 
                    percentage 
                  });
                });

                await Promise.all(uploadPromises);
              }
              
              completedTasks = totalTasks;
              updateProgress('✅ 모든 조사 내용 전송 완료!');
              
              const now = new Date();
              setLastSyncTime(`${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`);
              
              setTimeout(() => {
                if(window.confirm("구글 드라이브에 안전하게 전송되었습니다.\n새로운 현장 조사를 위해 화면을 초기화할까요?")) {
                  localStorage.removeItem('localProcessData');
                  localStorage.removeItem('localCompanyName');
                  setCompanyName('');
                  setIsCustomCompany(false);
                  setProcesses([emptyProcess()]);
                  setToastMessage('✨ 데이터가 초기화되었습니다. 새 조사를 시작하세요.');
                } else {
                  setToastMessage('✅ 모든 데이터 전송 완료!');
                }
                setIsSyncing(false);
              }, 600);

            } catch (error) {
              if (error.name === 'AbortError') {
                setIsSyncing(false);
                return; // 사용자가 취소한 경우 조용히 종료
              }
              console.error("업로드 실패:", error);
              alert("🚨 저장 실패: " + error.message);
              setToastMessage('❌ 업로드 중 오류가 발생했습니다.');
              setIsSyncing(false);
            }
          };

          const addProcess = () => {
            saveToServer(processes, true);
            setProcesses([...processes, emptyProcess()]);
          };

          const handleReset = () => {
            if(window.confirm("모든 작성 내용이 삭제되고 초기화됩니다.\n계속하시겠습니까?")) {
              localStorage.removeItem('localProcessData');
              localStorage.removeItem('localCompanyName');
              setCompanyName('');
              setIsCustomCompany(false);
              setProcesses([emptyProcess()]);
              setToastMessage('✨ 데이터가 초기화되었습니다. 새 조사를 시작하세요.');
            }
          };

          const removeProcess = (id) => {
            if (processes.length === 1) return alert('최소 1개의 공정은 있어야 합니다.');
            if(window.confirm('이 공정을 삭제하시겠습니까?')) {
               setProcesses(processes.filter(p => p.id !== id));
            }
          };

          const updateProcess = (id, field, value) => {
            setProcesses(prev => prev.map(p => p.id === id ? { ...p, [field]: value } : p));
          };

          const updateNestedArray = (processId, fieldName, index, key, value) => {
            setProcesses(processes.map(p => {
              if (p.id === processId) {
                const newArray = [...p[fieldName]];
                newArray[index] = { ...newArray[index], [key]: value };
                return { ...p, [fieldName]: newArray };
              }
              return p;
            }));
          };

          const addNestedItem = (processId, fieldName, emptyItem) => {
            setProcesses(processes.map(p => {
              if (p.id === processId) {
                return { ...p, [fieldName]: [...(p[fieldName] || []), emptyItem] };
              }
              return p;
            }));
          };

          const removeNestedItem = (processId, fieldName, index) => {
            setProcesses(processes.map(p => {
              if (p.id === processId) {
                const newArray = [...p[fieldName]];
                newArray.splice(index, 1);
                return { ...p, [fieldName]: newArray };
              }
              return p;
            }));
          };

          // 미디어 삭제 시 메모리 누수(임시 URL) 정리 기능 포함
          const removeMedia = (processId, index, type) => {
            if(confirm(`이 ${type === 'photo' ? '사진' : '동영상'}을 삭제하시겠습니까?`)) {
              setProcesses(prev => prev.map(p => {
                  if (p.id === processId) {
                      const newList = [...(p[type === 'photo' ? 'photos' : 'videos'] || [])];
                      const target = newList[index];
                      
                      // 🔥 삭제 시 업로드 중이라면 강제 취소
                      if (target && target.id && abortControllersRef.current[target.id]) {
                          abortControllersRef.current[target.id].abort();
                          delete abortControllersRef.current[target.id];
                      }

                      if (target && target.previewUrl) URL.revokeObjectURL(target.previewUrl);
                      newList.splice(index, 1);
                      return type === 'photo' ? { ...p, photos: newList } : { ...p, videos: newList };
                  }
                  return p;
              }));
            }
          };

          const getScoreInfo = (score) => {
            if (score === 0) return { text: '평가 전', color: 'text-slate-400', bg: 'bg-slate-100' };
            if (score >= 15) return { text: '고위험', color: 'text-red-600', bg: 'bg-red-50' };
            if (score >= 10) return { text: '중위험', color: 'text-orange-600', bg: 'bg-orange-50' };
            return { text: '저위험', color: 'text-green-600', bg: 'bg-green-50' };
          };

          return (
            <div className="flex justify-center bg-slate-200 min-h-screen font-sans">
              <div className="w-full max-w-md bg-slate-50 min-h-screen flex flex-col shadow-2xl relative overflow-hidden">
                
                {isSyncing && (
                  <div className="fixed inset-0 z-[120] bg-slate-900/80 backdrop-blur-sm flex items-center justify-center p-6 animate-in fade-in duration-200">
                    <div className="bg-white rounded-2xl p-6 w-full shadow-2xl flex flex-col items-center">
                      <RefreshCw className="w-12 h-12 text-blue-500 animate-spin mb-4" />
                      <h3 className="text-xl font-black text-slate-800 mb-2">서버 통신 중...</h3>
                      <p className="text-sm font-bold text-slate-500 mb-6 text-center h-10 break-keep">
                        {uploadProgress.text}
                      </p>
                      
                      <div className="w-full bg-slate-100 rounded-full h-3 mb-2 overflow-hidden border border-slate-200 shadow-inner">
                        <div 
                          className="bg-blue-600 h-full rounded-full transition-all duration-300 ease-out relative overflow-hidden" 
                          style={{ width: `${uploadProgress.percentage}%` }}
                        >
                          <div className="absolute inset-0 bg-white/20 w-full animate-[shimmer_2s_infinite]"></div>
                        </div>
                      </div>
                      
                      <div className="w-full flex justify-between items-center px-1">
                        <span className="text-xs font-bold text-slate-400">{uploadProgress.current} / {uploadProgress.total} 완료</span>
                        <span className="text-sm font-black text-blue-600">{uploadProgress.percentage}%</span>
                      </div>
                      
                      {/* 💡 전체 동기화 취소 버튼 추가 */}
                      <button 
                        onClick={() => {
                          if (globalAbortControllerRef.current) globalAbortControllerRef.current.abort();
                          setToastMessage('🚫 전체 동기화가 취소되었습니다.');
                        }}
                        className="mt-5 px-5 py-2 bg-slate-100 hover:bg-slate-200 text-slate-600 text-sm font-bold rounded-xl transition-colors w-full border border-slate-200"
                      >
                        동기화 취소
                      </button>
                    </div>
                  </div>
                )}

                {toastMessage && !isSyncing && !isSummarizing && !recordingField && (
                  <div className="absolute top-20 left-1/2 -translate-x-1/2 z-50 animate-in slide-in-from-top-4 fade-in duration-300 w-11/12 max-w-sm">
                    <div className="bg-slate-800 text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-3 text-sm font-medium">
                      {toastMessage.includes('중') ? <RefreshCw className="w-5 h-5 text-blue-400 shrink-0 animate-spin" /> : <CheckCircle2 className="w-5 h-5 text-green-400 shrink-0" />}
                      <span className="flex-1 break-keep">{toastMessage}</span>
                    </div>
                  </div>
                )}

                <header className="bg-blue-600 text-white p-4 sticky top-0 z-50 shadow-md flex justify-between items-center">
                  <div className="flex items-center gap-2">
                    <ChevronLeft className="w-6 h-6" />
                    <div>
                      <h1 className="text-lg font-bold">현장 조사표 작성</h1>
                      {lastSyncTime && (
                        <div className="text-[10px] text-blue-200 flex items-center gap-1 mt-0.5">
                          <Cloud className="w-3 h-3" /> 최근 동기화: {lastSyncTime}
                        </div>
                      )}
                    </div>
                  </div>
                  
                  <div className="flex items-center gap-2">
                    <button 
                      onClick={handleReset}
                      disabled={isSyncing || isSummarizing}
                      className="flex items-center gap-1 text-sm font-medium px-3 py-1.5 rounded-lg transition-colors bg-blue-500 hover:bg-blue-400 active:scale-95 disabled:opacity-50"
                      title="새로 작성하기"
                    >
                      <RefreshCw className="w-4 h-4" /> 초기화
                    </button>
                    
                    <button 
                      onClick={handleManualSave}
                      disabled={isSyncing || isSummarizing}
                      className={`flex items-center gap-1 text-sm font-medium px-3 py-1.5 rounded-lg transition-colors disabled:opacity-50 ${isSyncing ? 'bg-blue-800 text-blue-300' : 'bg-blue-700 hover:bg-blue-800 active:scale-95'}`}
                    >
                      {isSyncing ? <RefreshCw className="w-4 h-4 animate-spin" /> : <Save className="w-4 h-4" />}
                      {isSyncing ? '저장중' : '최종저장'}
                    </button>
                  </div>
                </header>

                <main className="flex-1 overflow-y-auto p-4 pb-24 space-y-6">
                  <div className="bg-blue-50 text-blue-800 p-3 rounded-lg text-sm flex gap-2 items-start border border-blue-100">
                    <AlertCircle className="w-5 h-5 shrink-0 mt-0.5" />
                    <div className="flex-1">
                      <p className="mb-1">작성하신 데이터와 사진/동영상은 <strong>구글 스프레드시트 및 드라이브</strong>에 자동 동기화됩니다.</p>
                    </div>
                  </div>

                  <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-300">
                    <label className="block text-sm font-bold text-slate-800 mb-2">
                      <span className="text-blue-600">■</span> 단위사업체 명 (대분류)
                    </label>
                    <div className="flex gap-2">
                      <select 
                        className="p-3 bg-slate-50 border border-slate-300 rounded-lg focus:outline-none focus:border-blue-500 font-bold w-[76px] shrink-0 text-center text-slate-700"
                        value={category}
                        onChange={(e) => {
                          setCategory(e.target.value);
                          localStorage.setItem('localCategory', e.target.value); 
                        }}
                      >
                        <option value="">선택</option>
                        {['정', '이', '박', '김', '조', '안', '윤', '강', '서'].map(c => (
                          <option key={c} value={c}>{c}</option>
                        ))}
                      </select>
                      
                      <div className="flex-1 flex flex-col gap-2 min-w-0">
                        <select 
                          className="w-full p-3 bg-slate-50 border border-slate-300 rounded-lg focus:outline-none focus:border-blue-500 font-bold text-slate-700 truncate"
                          value={isCustomCompany ? 'custom' : (fetchedCompanies.includes(companyName) ? companyName : (companyName ? 'custom' : ''))}
                          onChange={(e) => {
                            if (e.target.value === 'custom') {
                              setIsCustomCompany(true);
                              setCompanyName('');
                            } else {
                              setIsCustomCompany(false);
                              setCompanyName(e.target.value);
                            }
                          }}
                        >
                          <option value="">단위사업체 선택 (시트 연동됨)</option>
                          <option value="custom">✍️ 직접 입력...</option>
                          {fetchedCompanies.map((c, i) => (
                            <option key={i} value={c}>{c}</option>
                          ))}
                        </select>

                        {isCustomCompany && (
                          <input 
                            type="text" 
                            placeholder="예: 현대자동차 울산공장" 
                            className="w-full p-3 bg-white border border-slate-300 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/50 font-bold shadow-sm"
                            value={companyName}
                            onChange={(e) => setCompanyName(e.target.value)}
                          />
                        )}
                      </div>
                    </div>
                  </div>

                  {processes.map((process, index) => {
                    const score = process.workload * process.frequency;
                    const scoreInfo = getScoreInfo(score);
                    const safePhotos = process.photos || [];
                    const safeVideos = process.videos || [];
                    const availableProcesses = fetchedProcessMap[companyName] || [];

                    return (
                      <div key={process.id} className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <div className="bg-slate-100 p-3 border-b border-slate-200 flex justify-between items-center">
                          <div className="flex items-center gap-2">
                            <span className="bg-slate-800 text-white text-xs font-bold w-6 h-6 rounded-full flex items-center justify-center shrink-0">{index + 1}</span>

                              </div>
                              <div className="w-[55%] flex flex-col">
                                <div className="text-xs font-bold text-slate-700 mb-2 text-center bg-slate-200/70 py-1.5 rounded-lg">작업빈도 (B)</div>
                                <div className="flex flex-col gap-1.5 flex-1">
                                  {FREQUENCY_OPTIONS.map(opt => (
                                    <button key={`fq-${opt.value}`} onClick={() => updateProcess(process.id, 'frequency', opt.value)}
                                      className={`w-full flex-1 flex items-center justify-between p-2 rounded-lg border text-left transition-colors ${process.frequency === opt.value ? 'bg-indigo-600 text-white border-indigo-600 shadow-md font-bold' : 'bg-white text-slate-700 border-slate-300 hover:bg-slate-50 font-medium'}`}>
                                      <span className="text-[10px] leading-tight pr-1 flex-1 break-keep">{opt.label}</span>
                                      <span className={`w-5 h-5 shrink-0 rounded-full flex items-center justify-center text-[10px] ${process.frequency === opt.value ? 'bg-white/20' : 'bg-slate-100 text-slate-500'}`}>{opt.value}</span>
                                    </button>
                                  ))}
                                </div>
                              </div>
                            </div>

                            <div className={`mt-4 p-4 rounded-xl border ${scoreInfo.bg} ${scoreInfo.color.replace('text-', 'border-').replace('600', '200')}`}>
                              <div className="text-[11px] font-bold text-slate-600 mb-2 border-b border-black/5 pb-2">작업부하(A) × 작업빈도(B) = 작업부하빈도</div>
                              <div className="flex items-center justify-between">
                                <div className="flex items-end gap-2">
                                  <span className="text-3xl font-black leading-none">{score}</span>
                                  <span className="text-sm font-medium opacity-70 mb-0.5">({process.workload || '?'} × {process.frequency || '?'})</span>
                                </div>
                                <span className={`text-sm font-bold px-3 py-1.5 rounded-lg bg-white/60 shadow-sm ${scoreInfo.color}`}>{scoreInfo.text}</span>
                              </div>
                            </div>
                          </div>

                          {/* 6. 동영상 첨부 및 비동기 업로드 */}
                          <div className="pt-2 border-t border-slate-100">
                            <div className="flex items-center justify-between mb-2">
                              <label className="block text-sm font-semibold text-slate-700 flex items-center gap-1"><span className="text-blue-500">6.</span> 현장 동영상 첨부</label>
                              <span className="text-xs text-slate-400 font-medium">{safeVideos.length}개 / 최대 4개</span>
                            </div>
                            <div className="grid grid-cols-2 gap-3">
                              {safeVideos.map((videoItem, vIdx) => {
                                const srcStr = typeof videoItem === 'string' ? videoItem : (videoItem.previewUrl || videoItem.base64);
                                const isUploaded = typeof videoItem === 'object' && videoItem.isUploaded;
                                const isUploading = typeof videoItem === 'object' && videoItem.isUploading;
                                const uploadFailed = typeof videoItem === 'object' && videoItem.uploadFailed;
                                
                                return (
                                  <div key={vIdx} className="relative aspect-square bg-slate-800 rounded-xl overflow-hidden border border-slate-700 flex items-center justify-center">
                                    <video src={srcStr} controls className="w-full h-full object-cover"></video>
                                    
                                    {/* 💡 동영상 로딩 인디케이터 및 취소 버튼 */}
                                    {isUploading && (
                                      <div className="absolute inset-0 bg-slate-900/60 flex flex-col items-center justify-center z-10 backdrop-blur-[2px]">
                                        <RefreshCw className="w-5 h-5 text-white animate-spin mb-1" />
                                        <span className="text-[10px] text-white font-bold mb-1.5">서버 전송 중...</span>
                                        <button 
                                          onClick={(e) => { e.stopPropagation(); cancelUpload(process.id, videoItem.id, 'video'); }}
                                          className="px-2.5 py-1 bg-red-500 hover:bg-red-600 text-white rounded-md text-[10px] font-bold shadow-md transition-colors"
                                        >
                                          취소
                                        </button>
                                      </div>
                                    )}

                                    {uploadFailed && (
                                      <div className="absolute top-2 left-2 bg-red-500/90 text-white px-2 py-0.5 rounded-md text-[10px] font-bold shadow-sm backdrop-blur-sm flex items-center gap-1 z-10">
                                        <AlertCircle className="w-3 h-3" /> 실패(나중에 저장됨)
                                      </div>
                                    )}

                                    {!isUploading && isUploaded && (
                                      <div className="absolute top-2 left-2 bg-green-500/90 text-white px-2 py-0.5 rounded-md text-[10px] font-bold shadow-sm backdrop-blur-sm flex items-center gap-1 z-10">
                                        <Cloud className="w-3 h-3" /> 저장됨
                                      </div>
                                    )}

                                    <button onClick={() => removeMedia(process.id, vIdx, 'video')} className="absolute top-2 right-2 bg-red-500 text-white p-1.5 rounded-full shadow-md z-20"><Trash2 className="w-4 h-4" /></button>
                                  </div>
                                )
                              })}
                              {safeVideos.length < 4 && (
                                <button 
                                  onClick={() => setVideoPopupProcessId(process.id)}
                                  className="w-full aspect-square bg-slate-100 border-2 border-dashed border-slate-300 rounded-xl flex flex-col items-center justify-center text-slate-500 hover:bg-slate-50 hover:border-blue-400 hover:text-blue-500 cursor-pointer transition-colors relative outline-none"
                                >
                                  <VideoIcon className="w-8 h-8 mb-1" />
                                  <span className="text-xs font-bold text-center">1. 동영상 선택<br/>(자동 전송)</span>
                                  <span className="text-[10px] text-red-500 mt-1 font-bold">※ 최대 30MB</span>
                                </button>
                              )}
                            </div>
                          </div>
                          
                        </div>
                      </div>
                    );
                  })}
                </main>

                <div className="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-slate-50 via-slate-50/90 to-transparent pt-12">
                  <button onClick={addProcess} className="w-full py-4 bg-slate-800 text-white rounded-xl font-bold text-lg shadow-lg shadow-slate-800/20 flex items-center justify-center gap-2 active:scale-[0.98] transition-transform">
                    <Plus className="w-6 h-6" /> 신규 공정 생성 (기기 임시저장)
                  </button>
                </div>

                {/* 🔥 사진 촬영/첨부 커스텀 팝업 (모달) */}
                {photoPopupProcessId && (
                  <div className="fixed inset-0 z-[110] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 animate-in fade-in duration-200">
                    <div className="bg-white rounded-2xl w-full max-w-sm shadow-2xl overflow-hidden animate-in zoom-in-95 duration-200">
                      <div className="p-5 border-b border-slate-100 flex justify-between items-center">
                        <div>
                          <h3 className="text-lg font-bold text-slate-800">사진 첨부 방식</h3>
                          <p className="text-xs text-slate-500 mt-1">원하시는 방식을 선택해 주세요.</p>
                        </div>
                      </div>
                      <div className="p-4 space-y-3">
                        
                        {/* 옵션 1: 기본 카메라 바로 실행 */}
                        <label className="flex items-center gap-4 p-4 bg-blue-50 border border-blue-200 rounded-xl cursor-pointer hover:bg-blue-100 transition-colors shadow-sm">
                          <div className="bg-blue-600 p-2.5 rounded-full text-white shrink-0 shadow-md">
                            <Camera className="w-6 h-6" />
                          </div>
                          <div className="flex-1">
                            <div className="font-bold text-blue-800 text-[15px] mb-0.5">기본 카메라 촬영</div>
                            <div className="text-[11px] font-medium text-blue-600/80 leading-tight">카메라를 열어 즉시 촬영합니다.</div>
                          </div>
                          <input 
                            type="file" 
                            accept="image/*" 
                            capture="environment" 
                            className="hidden" 
                            onChange={(e) => {
                              handleMediaCaptureBackground(e, photoPopupProcessId, 'photo'); // 🔥 논블로킹 함수로 교체
                              setPhotoPopupProcessId(null);
                            }} 
                          />
                        </label>

                        {/* 옵션 2: 갤러리 */}
                        <label className="flex items-center gap-4 p-4 bg-slate-50 border border-slate-200 rounded-xl cursor-pointer hover:bg-slate-100 transition-colors shadow-sm">
                          <div className="bg-slate-400 p-2.5 rounded-full text-white shrink-0 shadow-md">
                            <ImageIcon className="w-6 h-6" />
                          </div>
                          <div className="flex-1">
                            <div className="font-bold text-slate-700 text-[15px] mb-0.5">갤러리 (사진 첨부)</div>
                            <div className="text-[11px] font-medium text-slate-500 leading-tight">스마트폰 갤러리에 저장된 사진을 불러옵니다.</div>
                          </div>
                          <input 
                            type="file" 
                            accept="image/*" 
                            className="hidden" 
                            onChange={(e) => {
                              handleMediaCaptureBackground(e, photoPopupProcessId, 'photo'); // 🔥 논블로킹 함수로 교체
                              setPhotoPopupProcessId(null);
                            }} 
                          />
                        </label>

                      </div>
                      <div className="p-4 bg-slate-50 border-t border-slate-100">
                        <button 
                          onClick={() => setPhotoPopupProcessId(null)}
                          className="w-full py-3 bg-white border border-slate-300 rounded-xl text-sm font-bold text-slate-600 hover:bg-slate-100 transition-colors shadow-sm"
                        >
                          취소
                        </button>
                      </div>
                    </div>
                  </div>
                )}

                {/* 🔥 동영상 촬영/첨부 커스텀 팝업 (모달) */}
                {videoPopupProcessId && (
                  <div className="fixed inset-0 z-[110] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 animate-in fade-in duration-200">
                    <div className="bg-white rounded-2xl w-full max-w-sm shadow-2xl overflow-hidden animate-in zoom-in-95 duration-200">
                      <div className="p-5 border-b border-slate-100 flex justify-between items-center">
                        <div>
                          <h3 className="text-lg font-bold text-slate-800">동영상 촬영/첨부 방식</h3>
                          <p className="text-xs text-slate-500 mt-1">원하시는 방식을 선택해 주세요.</p>
                        </div>
                      </div>
                      <div className="p-4 space-y-3">
                        
                        <label className="flex items-center gap-4 p-4 bg-purple-50 border border-purple-200 rounded-xl cursor-pointer hover:bg-purple-100 transition-colors shadow-sm">
                          <div className="bg-purple-600 p-2.5 rounded-full text-white shrink-0 shadow-md">
                            <VideoIcon className="w-6 h-6" />
                          </div>
                          <div className="flex-1">
                            <div className="font-black text-purple-800 text-[15px] mb-0.5">오픈 카메라 (어플 선택)</div>
                            <div className="text-[11px] font-medium text-purple-600/80 leading-tight">작업 선택 창이 뜨면 '오픈 카메라'를 골라 촬영합니다.</div>
                          </div>
                          <input 
                            type="file" 
                            accept="video/*" 
                            className="hidden" 
                            onChange={(e) => {
                              handleMediaCaptureBackground(e, videoPopupProcessId, 'video'); // 🔥 논블로킹 함수로 교체
                              setVideoPopupProcessId(null);
                            }} 
                          />
                        </label>

                        <label className="flex items-center gap-4 p-4 bg-blue-50 border border-blue-200 rounded-xl cursor-pointer hover:bg-blue-100 transition-colors shadow-sm">
                          <div className="bg-blue-600 p-2.5 rounded-full text-white shrink-0 shadow-md">
                            <Camera className="w-6 h-6" />
                          </div>
                          <div className="flex-1">
                            <div className="font-bold text-blue-800 text-[15px] mb-0.5">기본 카메라 (바로 실행)</div>
                            <div className="text-[11px] font-medium text-blue-600/80 leading-tight">스마트폰 내장 카메라를 즉시 켭니다. (저화질 설정 필수)</div>
                          </div>
                          <input 
                            type="file" 
                            accept="video/*" 
                            capture="environment" 
                            className="hidden" 
                            onChange={(e) => {
                              handleMediaCaptureBackground(e, videoPopupProcessId, 'video'); // 🔥 논블로킹 함수로 교체
                              setVideoPopupProcessId(null);
                            }} 
                          />
                        </label>

                        <label className="flex items-center gap-4 p-4 bg-slate-50 border border-slate-200 rounded-xl cursor-pointer hover:bg-slate-100 transition-colors shadow-sm">
                          <div className="bg-slate-400 p-2.5 rounded-full text-white shrink-0 shadow-md">
                            <ImageIcon className="w-6 h-6" />
                          </div>
                          <div className="flex-1">
                            <div className="font-bold text-slate-700 text-[15px] mb-0.5">갤러리 (파일 첨부)</div>
                            <div className="text-[11px] font-medium text-slate-500 leading-tight">스마트폰 갤러리에 저장된 동영상 파일을 불러옵니다.</div>
                          </div>
                          <input 
                            type="file" 
                            accept="video/*" 
                            className="hidden" 
                            onChange={(e) => {
                              handleMediaCaptureBackground(e, videoPopupProcessId, 'video'); // 🔥 논블로킹 함수로 교체
                              setVideoPopupProcessId(null);
                            }} 
                          />
                        </label>

                      </div>
                      <div className="p-4 bg-slate-50 border-t border-slate-100">
                        <button 
                          onClick={() => setVideoPopupProcessId(null)}
                          className="w-full py-3 bg-white border border-slate-300 rounded-xl text-sm font-bold text-slate-600 hover:bg-slate-100 transition-colors shadow-sm"
                        >
                          취소
                        </button>
                      </div>
                    </div>
                  </div>
                )}

              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MobileApp />);
    </script>
</body>
</html>

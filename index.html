<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>모바일 근골조사표 앱</title>
    
    <!-- Tailwind CSS (스타일링) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM (핵심 라이브러리) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel (브라우저에서 JSX 문법을 해석하기 위해 필요) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-200">
    <!-- 앱이 렌더링될 영역 -->
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 아이콘 컴포넌트 정의 (lucide-react 대체용) ---
        const Icon = ({ path, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className || "w-6 h-6"}>
                {path}
            </svg>
        );
        const ChevronLeft = ({className}) => <Icon className={className} path={<path d="m15 18-6-6 6-6"/>} />;
        const Save = ({className}) => <Icon className={className} path={<><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></>} />;
        const AlertCircle = ({className}) => <Icon className={className} path={<><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>} />;
        const Trash2 = ({className}) => <Icon className={className} path={<><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>} />;
        const Camera = ({className}) => <Icon className={className} path={<><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></>} />;
        const ImageIcon = ({className}) => <Icon className={className} path={<><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></>} />;
        const Plus = ({className}) => <Icon className={className} path={<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>} />;
        const CheckCircle2 = ({className}) => <Icon className={className} path={<><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>} />;
        const RefreshCw = ({className}) => <Icon className={className} path={<><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></>} />;
        const Cloud = ({className}) => <Icon className={className} path={<path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/>} />;

        // --- 선택 옵션 정의 ---
        const WORKLOAD_OPTIONS = [
          { value: 1, label: '매우쉬움' },
          { value: 2, label: '쉬움' },
          { value: 3, label: '약간힘듦' },
          { value: 4, label: '힘듦' },
          { value: 5, label: '매우힘듦' }
        ];

        const FREQUENCY_OPTIONS = [
          { value: 1, label: '3개월마다(2~3회/년)' },
          { value: 2, label: '가끔(하루또는1회/2~3일)' },
          { value: 3, label: '자주(1일4시간)' },
          { value: 4, label: '계속(1일4시간이상)' },
          { value: 5, label: '초과근무시간(1일8시간 이상)' }
        ];

        // 초기 빈 공정 데이터 양식
        const emptyProcess = () => ({
          id: Date.now().toString(),
          processName: '',
          workContent: '',
          workTime: '',
          workInfo: '',
          workload: 0,
          frequency: 0,
          photos: [null, null] // 기본 사진 슬롯 2개
        });

        // --- 메인 앱 컴포넌트 ---
        function MobileApp() {
          const [processes, setProcesses] = useState([emptyProcess()]);
          const [toastMessage, setToastMessage] = useState('');
          const [isSyncing, setIsSyncing] = useState(false);
          const [lastSyncTime, setLastSyncTime] = useState('');

          const TARGET_FOLDER_ID = '16DTHs4okhpe7dgXStwkp1KuhI3APU0JI';

          useEffect(() => {
            const savedData = localStorage.getItem('localProcessData');
            if (savedData) {
              setProcesses(JSON.parse(savedData));
            }
          }, []);

          useEffect(() => {
            if (toastMessage) {
              const timer = setTimeout(() => setToastMessage(''), 3000);
              return () => clearTimeout(timer);
            }
          }, [toastMessage]);

          const saveToServer = (data, isAutoSave = false) => {
            localStorage.setItem('localProcessData', JSON.stringify(data));
            
            if (isAutoSave) {
              setToastMessage('📱 기기 내부에 자동 저장되었습니다.');
            } else {
              setIsSyncing(true);
              setToastMessage('☁️ 지정된 구글 드라이브 폴더로 동기화 중입니다...');
              
              setTimeout(() => {
                setIsSyncing(false);
                const now = new Date();
                const timeString = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
                setLastSyncTime(timeString);
                setToastMessage('✅ 구글 드라이브 지정 폴더에 저장 완료!');
              }, 2000);
            }
          };

          const addProcess = () => {
            saveToServer(processes, true);
            setProcesses([...processes, emptyProcess()]);
          };

          const handleManualSave = () => {
            saveToServer(processes, false);
          };

          const removeProcess = (id) => {
            if (processes.length === 1) {
              alert('최소 1개의 공정은 있어야 합니다.');
              return;
            }
            setProcesses(processes.filter(p => p.id !== id));
          };

          const updateProcess = (id, field, value) => {
            setProcesses(processes.map(p => 
              p.id === id ? { ...p, [field]: value } : p
            ));
          };

          const addPhotoSlot = (id) => {
            setProcesses(processes.map(p => 
              p.id === id ? { ...p, photos: [...p.photos, null] } : p
            ));
          };

          const getScoreInfo = (score) => {
            if (score === 0) return { text: '평가 전', color: 'text-slate-400', bg: 'bg-slate-100' };
            if (score >= 15) return { text: '고위험', color: 'text-red-600', bg: 'bg-red-50' };
            if (score >= 10) return { text: '중위험', color: 'text-orange-600', bg: 'bg-orange-50' };
            return { text: '저위험', color: 'text-green-600', bg: 'bg-green-50' };
          };

          return (
            <div className="flex justify-center bg-slate-200 min-h-screen font-sans">
              <div className="w-full max-w-md bg-slate-50 min-h-screen flex flex-col shadow-2xl relative overflow-hidden">
                
                {/* Toast 알림창 */}
                {toastMessage && (
                  <div className="absolute top-20 left-1/2 -translate-x-1/2 z-50 animate-in slide-in-from-top-4 fade-in duration-300 w-11/12 max-w-sm">
                    <div className="bg-slate-800 text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-3 text-sm font-medium">
                      {isSyncing ? (
                        <RefreshCw className="w-5 h-5 text-blue-400 shrink-0 animate-spin" />
                      ) : (
                        <CheckCircle2 className="w-5 h-5 text-green-400 shrink-0" />
                      )}
                      {toastMessage}
                    </div>
                  </div>
                )}

                {/* App Header (Sticky) */}
                <header className="bg-blue-600 text-white p-4 sticky top-0 z-10 shadow-md flex justify-between items-center">
                  <div className="flex items-center gap-2">
                    <ChevronLeft className="w-6 h-6" />
                    <div>
                      <h1 className="text-lg font-bold">현장 조사표 작성</h1>
                      {lastSyncTime && (
                        <div className="text-[10px] text-blue-200 flex items-center gap-1 mt-0.5">
                          <Cloud className="w-3 h-3" /> 최근 동기화: {lastSyncTime}
                        </div>
                      )}
                    </div>
                  </div>
                  <button 
                    onClick={handleManualSave}
                    disabled={isSyncing}
                    className={`flex items-center gap-1 text-sm font-medium px-3 py-1.5 rounded-lg transition-colors ${
                      isSyncing ? 'bg-blue-800 text-blue-300' : 'bg-blue-700 hover:bg-blue-800 active:scale-95'
                    }`}
                  >
                    {isSyncing ? <RefreshCw className="w-4 h-4 animate-spin" /> : <Save className="w-4 h-4" />}
                    {isSyncing ? '저장중' : '최종저장'}
                  </button>
                </header>

                {/* Scrollable Content */}
                <main className="flex-1 overflow-y-auto p-4 pb-24 space-y-6 relative">
                  
                  <div className="bg-blue-50 text-blue-800 p-3 rounded-lg text-sm flex gap-2 items-start border border-blue-100">
                    <AlertCircle className="w-5 h-5 shrink-0 mt-0.5" />
                    <div className="flex-1">
                      <p className="mb-1">신규 공정 생성 시 기기 내부에 자동 저장되며, 데이터 손실을 방지합니다.</p>
                      <p className="text-xs text-blue-600 bg-blue-100/50 p-1.5 rounded border border-blue-200 mt-1">
                        🔗 연결된 드라이브 폴더 ID: <strong>{TARGET_FOLDER_ID.substring(0,12)}...</strong>
                      </p>
                    </div>
                  </div>

                  {processes.map((process, index) => {
                    const score = process.workload * process.frequency;
                    const scoreInfo = getScoreInfo(score);

                    return (
                      <div key={process.id} className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        {/* 공정 헤더 */}
                        <div className="bg-slate-100 p-3 border-b border-slate-200 flex justify-between items-center">
                          <div className="flex items-center gap-2">
                            <span className="bg-slate-800 text-white text-xs font-bold w-6 h-6 rounded-full flex items-center justify-center">
                              {index + 1}
                            </span>
                            <input 
                              type="text" 
                              placeholder="공정명 (예: 조립 1라인)" 
                              className="bg-transparent border-none font-bold text-slate-800 focus:outline-none focus:ring-0 p-0 placeholder-slate-400 w-48"
                              value={process.processName}
                              onChange={(e) => updateProcess(process.id, 'processName', e.target.value)}
                            />
                          </div>
                          <button 
                            onClick={() => removeProcess(process.id)}
                            className="p-1.5 text-slate-400 hover:text-red-500 rounded-lg"
                          >
                            <Trash2 className="w-5 h-5" />
                          </button>
                        </div>

                        <div className="p-4 space-y-5">
                          {/* 1. 작업내용 */}
                          <div>
                            <label className="block text-sm font-semibold text-slate-700 mb-1.5 flex items-center gap-1">
                              <span className="text-blue-500">1.</span> 작업내용
                            </label>
                            <textarea 
                              rows="2"
                              placeholder="주요 작업 내용을 입력하세요"
                              className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 resize-none"
                              value={process.workContent}
                              onChange={(e) => updateProcess(process.id, 'workContent', e.target.value)}
                            />
                          </div>

                          {/* 2. 작업시간 */}
                          <div>
                            <label className="block text-sm font-semibold text-slate-700 mb-1.5 flex items-center gap-1">
                              <span className="text-blue-500">2.</span> 작업시간
                            </label>
                            <input 
                              type="text" 
                              placeholder="예: 1일 4시간, 주 5일"
                              className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                              value={process.workTime}
                              onChange={(e) => updateProcess(process.id, 'workTime', e.target.value)}
                            />
                          </div>

                          {/* 3. 작업정보 */}
                          <div>
                            <label className="block text-sm font-semibold text-slate-700 mb-1.5 flex items-center gap-1">
                              <span className="text-blue-500">3.</span> 작업정보
                            </label>
                            <textarea 
                              rows="2"
                              placeholder="취급 무게, 작업 자세 등 상세 정보"
                              className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 resize-none"
                              value={process.workInfo}
                              onChange={(e) => updateProcess(process.id, 'workInfo', e.target.value)}
                            />
                          </div>

                          {/* 4. 작업부하 및 빈도 */}
                          <div className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                            <label className="block text-sm font-semibold text-slate-800 mb-4 flex items-center justify-between">
                              <span className="flex items-center gap-1">
                                <span className="text-blue-500">4.</span> 작업부하 및 작업빈도
                              </span>
                            </label>

                            <div className="flex gap-2 items-stretch">
                              {/* 작업부하 */}
                              <div className="w-[45%] flex flex-col">
                                <div className="text-xs font-bold text-slate-700 mb-2 text-center bg-slate-200/70 py-1.5 rounded-lg">
                                  작업부하 (A)
                                </div>
                                <div className="flex flex-col gap-1.5 flex-1">
                                  {WORKLOAD_OPTIONS.map(opt => (
                                    <button
                                      key={`wl-${opt.value}`}
                                      onClick={() => updateProcess(process.id, 'workload', opt.value)}
                                      className={`w-full flex-1 flex items-center justify-between p-2 rounded-lg border transition-colors ${
                                        process.workload === opt.value 
                                          ? 'bg-blue-600 text-white border-blue-600 shadow-md font-bold' 
                                          : 'bg-white text-slate-700 border-slate-300 hover:bg-slate-50 font-medium'
                                      }`}
                                    >
                                      <span className="text-xs">{opt.label}</span>
                                      <span className={`w-5 h-5 shrink-0 rounded-full flex items-center justify-center text-[10px] ${process.workload === opt.value ? 'bg-white/20' : 'bg-slate-100 text-slate-500'}`}>{opt.value}</span>
                                    </button>
                                  ))}
                                </div>
                              </div>

                              {/* 작업빈도 */}
                              <div className="w-[55%] flex flex-col">
                                <div className="text-xs font-bold text-slate-700 mb-2 text-center bg-slate-200/70 py-1.5 rounded-lg">
                                  작업빈도 (B)
                                </div>
                                <div className="flex flex-col gap-1.5 flex-1">
                                  {FREQUENCY_OPTIONS.map(opt => (
                                    <button
                                      key={`fq-${opt.value}`}
                                      onClick={() => updateProcess(process.id, 'frequency', opt.value)}
                                      className={`w-full flex-1 flex items-center justify-between p-2 rounded-lg border text-left transition-colors ${
                                        process.frequency === opt.value 
                                          ? 'bg-indigo-600 text-white border-indigo-600 shadow-md font-bold' 
                                          : 'bg-white text-slate-700 border-slate-300 hover:bg-slate-50 font-medium'
                                      }`}
                                    >
                                      <span className="text-[10px] leading-tight pr-1 flex-1 break-keep">{opt.label}</span>
                                      <span className={`w-5 h-5 shrink-0 rounded-full flex items-center justify-center text-[10px] ${process.frequency === opt.value ? 'bg-white/20' : 'bg-slate-100 text-slate-500'}`}>{opt.value}</span>
                                    </button>
                                  ))}
                                </div>
                              </div>
                            </div>

                            {/* 결과 점수판 */}
                            <div className={`mt-4 p-4 rounded-xl border ${scoreInfo.bg} ${scoreInfo.color.replace('text-', 'border-').replace('600', '200')}`}>
                              <div className="text-[11px] font-bold text-slate-600 mb-2 border-b border-black/5 pb-2">
                                작업부하(A) × 작업빈도(B) = 작업부하빈도
                              </div>
                              <div className="flex items-center justify-between">
                                <div className="flex items-end gap-2">
                                  <span className="text-3xl font-black leading-none">{score}</span>
                                  <span className="text-sm font-medium opacity-70 mb-0.5">
                                    ({process.workload || '?'} × {process.frequency || '?'})
                                  </span>
                                </div>
                                <span className={`text-sm font-bold px-3 py-1.5 rounded-lg bg-white/60 shadow-sm ${scoreInfo.color}`}>
                                  {scoreInfo.text}
                                </span>
                              </div>
                            </div>
                          </div>

                          {/* 5. 사진 첨부 */}
                          <div>
                            <div className="flex items-center justify-between mb-2">
                              <label className="block text-sm font-semibold text-slate-700 flex items-center gap-1">
                                <span className="text-blue-500">5.</span> 현장 사진 첨부
                              </label>
                              <span className="text-xs text-slate-400 font-medium">
                                총 {process.photos.length}장 첨부 가능
                              </span>
                            </div>
                            
                            <div className="grid grid-cols-2 gap-3">
                              {process.photos.map((_, pIdx) => (
                                <div key={pIdx} className="aspect-square bg-slate-100 border-2 border-dashed border-slate-300 rounded-xl flex flex-col items-center justify-center text-slate-400 hover:bg-slate-50 hover:border-blue-400 hover:text-blue-500 cursor-pointer transition-colors relative overflow-hidden group">
                                  <Camera className="w-8 h-8 mb-2" />
                                  <span className="text-xs font-medium">사진 촬영/선택</span>
                                  <div className="absolute inset-0 bg-black/5 opacity-0 group-active:opacity-100 transition-opacity"></div>
                                </div>
                              ))}
                            </div>

                            <button 
                              onClick={() => addPhotoSlot(process.id)}
                              className="w-full mt-3 py-2.5 bg-white border border-slate-300 rounded-xl text-sm font-medium text-slate-600 flex items-center justify-center gap-2 hover:bg-slate-50 active:bg-slate-100"
                            >
                              <ImageIcon className="w-4 h-4" /> 사진 추가 (현재 {process.photos.length}장)
                            </button>
                          </div>
                          
                        </div>
                      </div>
                    );
                  })}
                </main>

                {/* 하단 고정 FAB (신규 공정 생성 버튼) */}
                <div className="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-slate-50 via-slate-50/90 to-transparent pt-12">
                  <button 
                    onClick={addProcess}
                    className="w-full py-4 bg-slate-800 text-white rounded-xl font-bold text-lg shadow-lg shadow-slate-800/20 flex items-center justify-center gap-2 active:scale-[0.98] transition-transform"
                  >
                    <Plus className="w-6 h-6" /> 신규 공정 생성 (자동 저장)
                  </button>
                </div>
              </div>
            </div>
          );
        }

        // 앱 렌더링
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MobileApp />);
    </script>
</body>
</html>

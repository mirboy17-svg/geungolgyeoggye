<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>모바일 근골조사표 앱</title>
    
    <!-- Tailwind CSS (스타일링) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel (브라우저용 JSX 컴파일러) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 아이콘 컴포넌트 ---
        const Icon = ({ path, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className || "w-6 h-6"}>{path}</svg>
        );
        const ChevronLeft = ({className}) => <Icon className={className} path={<path d="m15 18-6-6 6-6"/>} />;
        const Save = ({className}) => <Icon className={className} path={<><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></>} />;
        const AlertCircle = ({className}) => <Icon className={className} path={<><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>} />;
        const Trash2 = ({className}) => <Icon className={className} path={<><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>} />;
        const Camera = ({className}) => <Icon className={className} path={<><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></>} />;
        const VideoIcon = ({className}) => <Icon className={className} path={<><path d="m22 8-6 4 6 4V8Z"/><rect x="2" y="6" width="14" height="12" rx="2" ry="2"/></>} />;
        const Plus = ({className}) => <Icon className={className} path={<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>} />;
        const CheckCircle2 = ({className}) => <Icon className={className} path={<><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>} />;
        const RefreshCw = ({className}) => <Icon className={className} path={<><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></>} />;
        const Cloud = ({className}) => <Icon className={className} path={<path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/>} />;

        // --- 선택 옵션 ---
        const WORKLOAD_OPTIONS = [
          { value: 1, label: '매우쉬움' },
          { value: 2, label: '쉬움' },
          { value: 3, label: '약간힘듦' },
          { value: 4, label: '힘듦' },
          { value: 5, label: '매우힘듦' }
        ];

        const FREQUENCY_OPTIONS = [
          { value: 1, label: '3개월마다(2~3회/년)' },
          { value: 2, label: '가끔(하루또는1회/2~3일)' },
          { value: 3, label: '자주(1일4시간)' },
          { value: 4, label: '계속(1일4시간이상)' },
          { value: 5, label: '초과근무시간(1일8시간 이상)' }
        ];

        // 초기 빈 공정 양식
        const emptyProcess = () => ({
          id: 'proc_' + Date.now().toString() + '_' + Math.random().toString(36).substr(2, 9),
          processName: '',
          workContent: '',
          workTime: '',
          workInfo: '',
          workload: 0,
          frequency: 0,
          photos: [],
          videos: []
        });

        // 💡 사진 초고효율 압축 함수 (480p 해상도 수준으로 강제 변환)
        const compressImage = (file) => {
          return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
              const img = new Image();
              img.src = event.target.result;
              img.onload = () => {
                const canvas = document.createElement('canvas');
                // 해상도를 480p (가로 또는 세로 최대 854픽셀) 수준으로 대폭 낮춤
                const MAX_WIDTH = 854; 
                const MAX_HEIGHT = 854;
                let width = img.width;
                let height = img.height;

                if (width > height) {
                  if (width > MAX_WIDTH) {
                    height *= MAX_WIDTH / width;
                    width = MAX_WIDTH;
                  }
                } else {
                  if (height > MAX_HEIGHT) {
                    width *= MAX_HEIGHT / height;
                    height = MAX_HEIGHT;
                  }
                }
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                // 화질(Quality)도 0.5(50%)로 깎아서 용량을 극한으로 줄임
                resolve(canvas.toDataURL('image/jpeg', 0.5));
              };
            };
          });
        };

        // --- 메인 앱 ---
        function MobileApp() {
          const [processes, setProcesses] = useState([emptyProcess()]);
          const [toastMessage, setToastMessage] = useState('');
          const [isSyncing, setIsSyncing] = useState(false);
          const [lastSyncTime, setLastSyncTime] = useState('');
          
          // 💡 상세 업로드 진행 상태 관리를 위한 state 추가
          const [uploadProgress, setUploadProgress] = useState({ current: 0, total: 0, text: '', percentage: 0 });

          const TARGET_FOLDER_ID = '16DTHs4okhpe7dgXStwkp1KuhI3APU0JI';
          // 🚀 [중요] 새로 배포한 '구글 웹 앱 URL'을 아래에 붙여넣으세요!
          const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxof1_-oWTbesoOgWGjjQzbfOFt-e9hZJCQSWpp5ND4ETxSGmtRHCtx8-65ml74v2HAXQ/exec'; 

          useEffect(() => {
            try {
              const savedData = localStorage.getItem('localProcessData');
              if (savedData) {
                const parsedData = JSON.parse(savedData);
                const safeData = parsedData.map(p => ({
                  ...emptyProcess(),
                  ...p,
                  photos: Array.isArray(p.photos) ? p.photos.filter(photo => photo !== null) : [],
                  videos: Array.isArray(p.videos) ? p.videos : []
                }));
                setProcesses(safeData);
              }
            } catch (error) {
              localStorage.removeItem('localProcessData');
            }
          }, []);

          useEffect(() => {
            if (toastMessage && !isSyncing) {
              const timer = setTimeout(() => setToastMessage(''), 3000);
              return () => clearTimeout(timer);
            }
          }, [toastMessage, isSyncing]);

          // 🚀 분할 전송 시스템 및 진행률 UI 연동
          const saveToServer = async (data, isAutoSave = false) => {
            localStorage.setItem('localProcessData', JSON.stringify(data));
            if (isAutoSave) {
              setToastMessage('📱 기기 내부 임시 저장 완료');
              return;
            }

            if (GAS_WEB_APP_URL.includes('여기에_복사한')) {
              alert("소스코드에 구글 앱스 스크립트 URL이 입력되지 않았습니다!");
              return;
            }

            setIsSyncing(true);
            
            try {
              const mediaQueue = [];
              const nowForName = new Date();
              const timeStr = `${nowForName.getHours()}${nowForName.getMinutes()}${nowForName.getSeconds()}`;
              const processNamesStr = data.map((p, index) => p.processName || `미지정공정${index + 1}`).join(', ');

              const fetchUrl = GAS_WEB_APP_URL + (GAS_WEB_APP_URL.includes('?') ? '&' : '?') + 't=' + Date.now();

              const spreadsheetPayload = {
                type: 'spreadsheet',
                folderId: TARGET_FOLDER_ID,
                spreadsheetName: `근골조사표(${processNamesStr})_${nowForName.toISOString().slice(0,10)}_${timeStr}`,
                processes: data.map((p, index) => {
                  const processName = p.processName || `미지정_공정_${index + 1}`;
                  
                  (p.photos || []).forEach((base64, i) => {
                    mediaQueue.push({ type: 'media', folderId: TARGET_FOLDER_ID, fileName: `${processName}_사진_${i + 1}.jpg`, fileData: base64 });
                  });
                  (p.videos || []).forEach((base64, i) => {
                    mediaQueue.push({ type: 'media', folderId: TARGET_FOLDER_ID, fileName: `${processName}_동영상_${i + 1}.mp4`, fileData: base64 });
                  });

                  return {
                    sheetName: processName,
                    info: {
                      "공정명": processName,
                      "작업내용": p.workContent,
                      "작업시간": p.workTime,
                      "작업정보": p.workInfo,
                      "작업부하(A)": p.workload,
                      "작업빈도(B)": p.frequency,
                      "총점": p.workload * p.frequency
                    }
                  };
                })
              };

              // 💡 진행률 계산 변수 설정
              const totalTasks = 1 + mediaQueue.length; // 스프레드시트 1개 + 미디어 파일 수
              let completedTasks = 0;

              const updateProgress = (text) => {
                const percentage = Math.round((completedTasks / totalTasks) * 100);
                setUploadProgress({ current: completedTasks, total: totalTasks, text, percentage });
              };

              updateProgress('☁️ 텍스트 데이터(스프레드시트) 전송 중...');
              
              let response = await fetch(fetchUrl, {
                method: 'POST',
                // 🔥 수정됨: CORS 에러(Failed to fetch)를 유발하는 Cache-Control 헤더 제거
                headers: { 
                  'Content-Type': 'text/plain;charset=utf-8'
                },
                body: JSON.stringify(spreadsheetPayload)
              });
              let result = await response.json();
              if (result.status !== "success") throw new Error(result.message);

              completedTasks++;
              updateProgress('☁️ 미디어 파일 전송 준비 중...');

              const totalMedia = mediaQueue.length;
              for (let i = 0; i < totalMedia; i++) {
                const mediaItem = mediaQueue[i];
                const isVideo = mediaItem.fileName.includes('동영상');
                
                updateProgress(`업로드 중 (${i + 1}/${totalMedia}): ${isVideo ? '동영상' : '사진'}`);
                
                response = await fetch(fetchUrl, {
                  method: 'POST',
                  // 🔥 수정됨: CORS 에러(Failed to fetch)를 유발하는 Cache-Control 헤더 제거
                  headers: { 
                    'Content-Type': 'text/plain;charset=utf-8'
                  },
                  body: JSON.stringify(mediaItem)
                });
                result = await response.json();
                if (result.status !== "success") throw new Error(`업로드 실패: ${mediaItem.fileName}`);
                
                completedTasks++;
                updateProgress(`업로드 완료 (${i + 1}/${totalMedia})`);
              }
              
              // 100% 완료 처리
              completedTasks = totalTasks;
              updateProgress('✅ 모든 데이터 전송 완료!');
              
              const now = new Date();
              setLastSyncTime(`${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`);
              
              // 약간의 딜레이 후 팝업 띄우기 (진행률 100%를 보여주기 위함)
              setTimeout(() => {
                if(window.confirm("구글 드라이브에 안전하게 전송되었습니다.\n새로운 현장 조사를 위해 화면을 초기화할까요?")) {
                  localStorage.removeItem('localProcessData');
                  setProcesses([emptyProcess()]);
                  setToastMessage('✨ 화면이 초기화되었습니다. 새 조사를 시작하세요.');
                } else {
                  setToastMessage('✅ 모든 데이터 및 파일 전송 완료!');
                }
                setIsSyncing(false);
              }, 600);

            } catch (error) {
              console.error("업로드 실패:", error);
              alert("🚨 저장 실패 상세 원인:\n" + error.message);
              setToastMessage('❌ 업로드 중 오류가 발생했습니다.');
              setIsSyncing(false);
            }
          };

          const addProcess = () => {
            saveToServer(processes, true);
            setProcesses([...processes, emptyProcess()]);
          };

          const handleManualSave = () => saveToServer(processes, false);

          const handleReset = () => {
            if(window.confirm("모든 작성 내용이 삭제되고 초기화됩니다.\n계속하시겠습니까?")) {
              localStorage.removeItem('localProcessData');
              setProcesses([emptyProcess()]);
              setToastMessage('✨ 데이터가 초기화되었습니다. 새 조사를 시작하세요.');
            }
          };

          const removeProcess = (id) => {
            if (processes.length === 1) return alert('최소 1개의 공정은 있어야 합니다.');
            setProcesses(processes.filter(p => p.id !== id));
          };

          const updateProcess = (id, field, value) => {
            setProcesses(processes.map(p => p.id === id ? { ...p, [field]: value } : p));
          };

          // 동영상 버튼 클릭 시 경고 알림창
          const handleVideoClick = () => {
            alert("🚨 [동영상 촬영 주의사항]\n\n동영상 용량이 크면 서버 저장이 실패합니다.\n\n✔️ 10초 이내로 핵심 작업만 짧게 촬영해 주세요.\n✔️ 가능하면 휴대폰 카메라 설정에서 화질을 'VGA(480p)'나 'HD(720p)'로 낮춰주세요.");
          };

          const handleMediaCapture = async (e, processId, type) => {
            const file = e.target.files[0];
            if (!file) return;

            // 엄격한 용량 제한
            const maxSizeMB = type === 'photo' ? 10 : 15; 
            if (file.size > maxSizeMB * 1024 * 1024) {
              alert(`⚠️ 파일 용량이 너무 큽니다! (${(file.size / 1024 / 1024).toFixed(1)}MB)\n\n${type === 'photo' ? '사진은 10MB' : '동영상은 15MB'} 이하만 첨부 가능합니다.\n\n해결방법: 카메라 설정에서 화질을 낮추거나 더 짧게 촬영하세요.`);
              e.target.value = null;
              return;
            }

            setToastMessage('⏳ 미디어 처리 중...');

            let base64Data;
            if (type === 'photo') {
              // 사진은 첨부 즉시 크기를 줄여(압축) 용량을 1/10로 최적화합니다.
              base64Data = await compressImage(file);
            } else {
              // 동영상은 그대로 Base64 변환
              base64Data = await new Promise((resolve) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.readAsDataURL(file);
              });
            }

            setProcesses(processes.map(p => {
                if (p.id === processId) {
                    return type === 'photo' 
                        ? { ...p, photos: [...(p.photos || []), base64Data] }
                        : { ...p, videos: [...(p.videos || []), base64Data] };
                }
                return p;
            }));
            
            setToastMessage(''); // Toast 숨기기
            e.target.value = null;
          };

          const removeMedia = (processId, index, type) => {
            if(confirm(`이 ${type === 'photo' ? '사진' : '동영상'}을 삭제하시겠습니까?`)) {
              setProcesses(processes.map(p => {
                  if (p.id === processId) {
                      const newList = [...(p[type === 'photo' ? 'photos' : 'videos'] || [])];
                      newList.splice(index, 1);
                      return type === 'photo' ? { ...p, photos: newList } : { ...p, videos: newList };
                  }
                  return p;
              }));
            }
          };

          const getScoreInfo = (score) => {
            if (score === 0) return { text: '평가 전', color: 'text-slate-400', bg: 'bg-slate-100' };
            if (score >= 15) return { text: '고위험', color: 'text-red-600', bg: 'bg-red-50' };
            if (score >= 10) return { text: '중위험', color: 'text-orange-600', bg: 'bg-orange-50' };
            return { text: '저위험', color: 'text-green-600', bg: 'bg-green-50' };
          };

          return (
            <div className="flex justify-center bg-slate-200 min-h-screen font-sans">
              <div className="w-full max-w-md bg-slate-50 min-h-screen flex flex-col shadow-2xl relative overflow-hidden">
                
                {/* 🔥 상세 진행률 오버레이 모달 (isSyncing 일 때만 화면을 덮음) */}
                {isSyncing && (
                  <div className="absolute inset-0 bg-slate-900/80 z-[100] flex items-center justify-center p-6 backdrop-blur-sm transition-opacity">
                    <div className="bg-white rounded-2xl p-6 w-full shadow-2xl flex flex-col items-center">
                      <RefreshCw className="w-12 h-12 text-blue-500 animate-spin mb-4" />
                      <h3 className="text-xl font-black text-slate-800 mb-2">서버 전송 중...</h3>
                      <p className="text-sm font-bold text-slate-500 mb-6 text-center h-5">
                        {uploadProgress.text}
                      </p>
                      
                      {/* 프로그레스 바 영역 */}
                      <div className="w-full bg-slate-100 rounded-full h-3 mb-2 overflow-hidden border border-slate-200 shadow-inner">
                        <div 
                          className="bg-blue-600 h-full rounded-full transition-all duration-500 ease-out relative overflow-hidden" 
                          style={{ width: `${uploadProgress.percentage}%` }}
                        >
                          {/* 진행률 바 애니메이션 효과 */}
                          <div className="absolute inset-0 bg-white/20 w-full animate-[shimmer_2s_infinite]"></div>
                        </div>
                      </div>
                      
                      <div className="w-full flex justify-between items-center px-1">
                        <span className="text-xs font-bold text-slate-400">{uploadProgress.current} / {uploadProgress.total} 완료</span>
                        <span className="text-sm font-black text-blue-600">{uploadProgress.percentage}%</span>
                      </div>
                      
                      <p className="text-[10px] text-slate-400 mt-5 text-center leading-tight">
                        데이터 용량에 따라 시간이 걸릴 수 있습니다.<br/>화면을 끄거나 앱을 종료하지 마세요.
                      </p>
                    </div>
                  </div>
                )}

                {/* Toast 알림창 (오버레이가 없을 때만 표시) */}
                {toastMessage && !isSyncing && (
                  <div className="absolute top-20 left-1/2 -translate-x-1/2 z-50 animate-in slide-in-from-top-4 fade-in duration-300 w-11/12 max-w-sm">
                    <div className="bg-slate-800 text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-3 text-sm font-medium">
                      <CheckCircle2 className="w-5 h-5 text-green-400 shrink-0" />
                      {toastMessage}
                    </div>
                  </div>
                )}

                {/* App Header */}
                <header className="bg-blue-600 text-white p-4 sticky top-0 z-10 shadow-md flex justify-between items-center">
                  <div className="flex items-center gap-2">
                    <ChevronLeft className="w-6 h-6" />
                    <div>
                      <h1 className="text-lg font-bold">현장 조사표 작성</h1>
                      {lastSyncTime && (
                        <div className="text-[10px] text-blue-200 flex items-center gap-1 mt-0.5">
                          <Cloud className="w-3 h-3" /> 최근 동기화: {lastSyncTime}
                        </div>
                      )}
                    </div>
                  </div>
                  
                  <div className="flex items-center gap-2">
                    <button 
                      onClick={handleReset}
                      disabled={isSyncing}
                      className="flex items-center gap-1 text-sm font-medium px-3 py-1.5 rounded-lg transition-colors bg-blue-500 hover:bg-blue-400 active:scale-95"
                      title="새로 작성하기"
                    >
                      <RefreshCw className="w-4 h-4" /> 초기화
                    </button>
                    <button 
                      onClick={handleManualSave}
                      disabled={isSyncing}
                      className={`flex items-center gap-1 text-sm font-medium px-3 py-1.5 rounded-lg transition-colors ${isSyncing ? 'bg-blue-800 text-blue-300' : 'bg-blue-700 hover:bg-blue-800 active:scale-95'}`}
                    >
                      {isSyncing ? <RefreshCw className="w-4 h-4 animate-spin" /> : <Save className="w-4 h-4" />}
                      {isSyncing ? '저장중' : '최종저장'}
                    </button>
                  </div>
                </header>

                {/* Main Content */}
                <main className="flex-1 overflow-y-auto p-4 pb-24 space-y-6">
                  <div className="bg-blue-50 text-blue-800 p-3 rounded-lg text-sm flex gap-2 items-start border border-blue-100">
                    <AlertCircle className="w-5 h-5 shrink-0 mt-0.5" />
                    <div className="flex-1">
                      <p className="mb-1">작성하신 데이터와 사진/동영상은 <strong>구글 스프레드시트 및 드라이브</strong>에 자동 동기화됩니다.</p>
                    </div>
                  </div>

                  {processes.map((process, index) => {
                    const score = process.workload * process.frequency;
                    const scoreInfo = getScoreInfo(score);
                    const safePhotos = process.photos || [];
                    const safeVideos = process.videos || [];

                    return (
                      <div key={process.id} className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        {/* 공정 헤더 */}
                        <div className="bg-slate-100 p-3 border-b border-slate-200 flex justify-between items-center">
                          <div className="flex items-center gap-2">
                            <span className="bg-slate-800 text-white text-xs font-bold w-6 h-6 rounded-full flex items-center justify-center">{index + 1}</span>
                            <input 
                              type="text" 
                              placeholder="공정명 (예: 조립 1라인)" 
                              className="bg-transparent border-none font-bold text-slate-800 focus:outline-none focus:ring-0 p-0 placeholder-slate-400 w-48"
                              value={process.processName}
                              onChange={(e) => updateProcess(process.id, 'processName', e.target.value)}
                            />
                          </div>
                          <button onClick={() => removeProcess(process.id)} className="p-1.5 text-slate-400 hover:text-red-500 rounded-lg"><Trash2 className="w-5 h-5" /></button>
                        </div>

                        <div className="p-4 space-y-5">
                          {/* 1~3번 항목 */}
                          {['workContent', 'workTime', 'workInfo'].map((field, idx) => {
                            const labels = ['작업내용', '작업시간', '작업정보'];
                            const placeholders = ['주요 작업 내용을 입력하세요', '예: 1일 4시간, 주 5일', '취급 무게, 작업 자세 등 상세 정보'];
                            return (
                              <div key={field}>
                                <label className="block text-sm font-semibold text-slate-700 mb-1.5 flex items-center gap-1">
                                  <span className="text-blue-500">{idx + 1}.</span> {labels[idx]}
                                </label>
                                {field === 'workTime' ? (
                                  <input 
                                    type="text" placeholder={placeholders[idx]} 
                                    className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                                    value={process[field]} onChange={(e) => updateProcess(process.id, field, e.target.value)}
                                  />
                                ) : (
                                  <textarea 
                                    rows="2" placeholder={placeholders[idx]}
                                    className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 resize-none"
                                    value={process[field]} onChange={(e) => updateProcess(process.id, field, e.target.value)}
                                  />
                                )}
                              </div>
                            );
                          })}

                          {/* 4. 작업부하 및 빈도 */}
                          <div className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                            <label className="block text-sm font-semibold text-slate-800 mb-4 flex items-center">
                              <span className="text-blue-500 mr-1">4.</span> 작업부하 및 작업빈도
                            </label>

                            <div className="flex gap-2 items-stretch">
                              <div className="w-[45%] flex flex-col">
                                <div className="text-xs font-bold text-slate-700 mb-2 text-center bg-slate-200/70 py-1.5 rounded-lg">작업부하 (A)</div>
                                <div className="flex flex-col gap-1.5 flex-1">
                                  {WORKLOAD_OPTIONS.map(opt => (
                                    <button key={`wl-${opt.value}`} onClick={() => updateProcess(process.id, 'workload', opt.value)}
                                      className={`w-full flex-1 flex items-center justify-between p-2 rounded-lg border transition-colors ${process.workload === opt.value ? 'bg-blue-600 text-white border-blue-600 shadow-md font-bold' : 'bg-white text-slate-700 border-slate-300 hover:bg-slate-50 font-medium'}`}>
                                      <span className="text-xs">{opt.label}</span>
                                      <span className={`w-5 h-5 shrink-0 rounded-full flex items-center justify-center text-[10px] ${process.workload === opt.value ? 'bg-white/20' : 'bg-slate-100 text-slate-500'}`}>{opt.value}</span>
                                    </button>
                                  ))}
                                </div>
                              </div>
                              <div className="w-[55%] flex flex-col">
                                <div className="text-xs font-bold text-slate-700 mb-2 text-center bg-slate-200/70 py-1.5 rounded-lg">작업빈도 (B)</div>
                                <div className="flex flex-col gap-1.5 flex-1">
                                  {FREQUENCY_OPTIONS.map(opt => (
                                    <button key={`fq-${opt.value}`} onClick={() => updateProcess(process.id, 'frequency', opt.value)}
                                      className={`w-full flex-1 flex items-center justify-between p-2 rounded-lg border text-left transition-colors ${process.frequency === opt.value ? 'bg-indigo-600 text-white border-indigo-600 shadow-md font-bold' : 'bg-white text-slate-700 border-slate-300 hover:bg-slate-50 font-medium'}`}>
                                      <span className="text-[10px] leading-tight pr-1 flex-1 break-keep">{opt.label}</span>
                                      <span className={`w-5 h-5 shrink-0 rounded-full flex items-center justify-center text-[10px] ${process.frequency === opt.value ? 'bg-white/20' : 'bg-slate-100 text-slate-500'}`}>{opt.value}</span>
                                    </button>
                                  ))}
                                </div>
                              </div>
                            </div>

                            <div className={`mt-4 p-4 rounded-xl border ${scoreInfo.bg} ${scoreInfo.color.replace('text-', 'border-').replace('600', '200')}`}>
                              <div className="text-[11px] font-bold text-slate-600 mb-2 border-b border-black/5 pb-2">작업부하(A) × 작업빈도(B) = 작업부하빈도</div>
                              <div className="flex items-center justify-between">
                                <div className="flex items-end gap-2">
                                  <span className="text-3xl font-black leading-none">{score}</span>
                                  <span className="text-sm font-medium opacity-70 mb-0.5">({process.workload || '?'} × {process.frequency || '?'})</span>
                                </div>
                                <span className={`text-sm font-bold px-3 py-1.5 rounded-lg bg-white/60 shadow-sm ${scoreInfo.color}`}>{scoreInfo.text}</span>
                              </div>
                            </div>
                          </div>

                          {/* 5. 사진 첨부 */}
                          <div>
                            <div className="flex items-center justify-between mb-2">
                              <label className="block text-sm font-semibold text-slate-700 flex items-center gap-1"><span className="text-blue-500">5.</span> 현장 사진 첨부</label>
                              <span className="text-xs text-slate-400 font-medium">{safePhotos.length}장 / 최대 10장</span>
                            </div>
                            <div className="grid grid-cols-2 gap-3">
                              {safePhotos.map((photoStr, pIdx) => (
                                <div key={pIdx} className="relative aspect-square bg-slate-100 rounded-xl overflow-hidden border border-slate-200">
                                  <img src={photoStr} className="w-full h-full object-cover" />
                                  <button onClick={() => removeMedia(process.id, pIdx, 'photo')} className="absolute top-2 right-2 bg-red-500 text-white p-1.5 rounded-full shadow-md"><Trash2 className="w-4 h-4" /></button>
                                </div>
                              ))}
                              {safePhotos.length < 10 && (
                                <label className="aspect-square bg-slate-100 border-2 border-dashed border-slate-300 rounded-xl flex flex-col items-center justify-center text-slate-400 hover:bg-slate-50 cursor-pointer transition-colors relative">
                                  <Camera className="w-8 h-8 mb-2" />
                                  <span className="text-xs font-medium text-center">사진 촬영<br/>(자동 압축됨)</span>
                                  <input type="file" accept="image/*" capture="environment" className="hidden" onChange={(e) => handleMediaCapture(e, process.id, 'photo')} />
                                </label>
                              )}
                            </div>
                          </div>

                          {/* 6. 동영상 첨부 (경고창 추가) */}
                          <div className="pt-2 border-t border-slate-100">
                            <div className="flex items-center justify-between mb-2">
                              <label className="block text-sm font-semibold text-slate-700 flex items-center gap-1"><span className="text-blue-500">6.</span> 현장 동영상 첨부</label>
                              <span className="text-xs text-slate-400 font-medium">{safeVideos.length}개 / 최대 4개</span>
                            </div>
                            <div className="grid grid-cols-2 gap-3">
                              {safeVideos.map((videoStr, vIdx) => (
                                <div key={vIdx} className="relative aspect-square bg-slate-800 rounded-xl overflow-hidden border border-slate-700 flex items-center justify-center">
                                  <video src={videoStr} controls className="w-full h-full object-cover"></video>
                                  <button onClick={() => removeMedia(process.id, vIdx, 'video')} className="absolute top-2 right-2 bg-red-500 text-white p-1.5 rounded-full shadow-md z-10"><Trash2 className="w-4 h-4" /></button>
                                </div>
                              ))}
                              {safeVideos.length < 4 && (
                                <label 
                                  onClick={handleVideoClick}
                                  className="aspect-square bg-slate-100 border-2 border-dashed border-slate-300 rounded-xl flex flex-col items-center justify-center text-slate-400 hover:bg-slate-50 cursor-pointer transition-colors relative">
                                  <VideoIcon className="w-8 h-8 mb-1" />
                                  <span className="text-xs font-bold text-slate-600">동영상 촬영</span>
                                  <span className="text-[10px] text-red-500 mt-1 font-bold">※ 짧게, 화질 낮춰서</span>
                                  <input type="file" accept="video/*" capture="environment" className="hidden" onChange={(e) => handleMediaCapture(e, process.id, 'video')} />
                                </label>
                              )}
                            </div>
                          </div>
                          
                        </div>
                      </div>
                    );
                  })}
                </main>

                {/* 하단 고정 FAB */}
                <div className="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-slate-50 via-slate-50/90 to-transparent pt-12">
                  <button onClick={addProcess} className="w-full py-4 bg-slate-800 text-white rounded-xl font-bold text-lg shadow-lg shadow-slate-800/20 flex items-center justify-center gap-2 active:scale-[0.98] transition-transform">
                    <Plus className="w-6 h-6" /> 신규 공정 생성 (기기 임시저장)
                  </button>
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MobileApp />);
    </script>
</body>
</html>
